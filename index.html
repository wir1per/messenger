<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#030305">
<title>Wiriper Prime - Royal Edition 4.0</title>
<link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
<link href="[https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap](https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap)" rel="stylesheet">
<style>
:root {
/* Next-Gen Royal Dark Theme 4.0 */
--bg: #030305;
--bg2: #0b0b10;
--panel: rgba(18, 18, 24, 0.85);
--panel2: rgba(25, 25, 32, 0.95);
--gold: #fadd85;
--gold2: #dfb73e;
--gold-glow: 0 0 20px rgba(223, 183, 62, 0.3);
--gold-glow-strong: 0 0 40px rgba(223, 183, 62, 0.6);
--txt: #f0f2f5;
--muted: #9ca3af;
--selection: rgba(250, 221, 133, 0.2);
/* 120fps Hardware Acceleration Core Variables */
--ease-royal: cubic-bezier(0.16, 1, 0.3, 1);
}
/* Reset & High-Performance Core */
 * {
   box-sizing: border-box;
   margin: 0;
   padding: 0;
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
   -webkit-font-smoothing: antialiased;
   -moz-osx-font-smoothing: grayscale;
   user-select: none;
   -webkit-tap-highlight-color: transparent;
   }
body, html {
background-color: var(--bg);
color: var(--txt);
width: 100%;
height: 100%;
overflow: hidden;
position: relative;
}
/* Scrollbar Optimization for 120Hz Displays */
::-webkit-scrollbar {
width: 5px;
height: 5px;
}
::-webkit-scrollbar-track {
background: transparent;
}
::-webkit-scrollbar-thumb {
background: rgba(250, 221, 133, 0.15);
border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
background: var(--gold2);
}
/* GPU Optimized Dynamic Splash Screen */
#luxurySplash {
position: fixed;
inset: 0;
background: radial-gradient(circle at center, #0a0a0f 0%, #030305 100%);
z-index: 10000;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
will-change: opacity, transform;
transition: opacity 1.2s var(--ease-royal), transform 1.2s var(--ease-royal);
}
.splash-logo {
font-family: 'Cinzel', serif;
font-size: 3.5rem;
font-weight: 900;
color: transparent;
background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, var(--gold2) 100%);
-webkit-background-clip: text;
background-clip: text;
letter-spacing: 4px;
text-shadow: var(--gold-glow);
animation: royalPulse 3s infinite ease-in-out;
opacity: 0;
transform: scale3d(0.92, 0.92, 1);
will-change: transform, opacity;
}
.splash-subtitle {
font-family: 'Cinzel', serif;
font-size: 0.9rem;
color: var(--gold);
letter-spacing: 8px;
margin-top: 15px;
opacity: 0;
transform: translate3d(0, 15px, 0);
text-transform: uppercase;
}
@keyframes royalPulse {
0%, 100% { filter: drop-shadow(0 0 15px rgba(250, 221, 133, 0.2)); transform: scale3d(1, 1, 1); }
50% { filter: drop-shadow(0 0 35px rgba(223, 183, 62, 0.5)); transform: scale3d(1.02, 1.02, 1); }
}
/* App Main Layout Structure */
#appContainer {
display: grid;
grid-template-columns: 360px 1fr;
width: 100vw;
height: 100vh;
opacity: 0;
transform: scale3d(1.03, 1.03, 1);
will-change: opacity, transform;
transition: opacity 1s var(--ease-royal), transform 1s var(--ease-royal);
}
/* Sidebar Architecture */
.sidebar {
background: var(--bg2);
border-left: 1px solid rgba(250, 221, 133, 0.08);
display: flex;
flex-direction: column;
height: 100%;
position: relative;
z-index: 10;
}
.sidebar-header {
padding: 24px;
background: linear-gradient(to bottom, rgba(11,11,16,1), rgba(11,11,16,0.8));
border-bottom: 1px solid rgba(250, 221, 133, 0.05);
display: flex;
align-items: center;
justify-content: space-between;
}
.brand-title {
font-family: 'Cinzel', serif;
font-size: 1.4rem;
font-weight: 700;
color: var(--gold);
text-shadow: var(--gold-glow);
}
.profile-trigger {
width: 42px;
height: 42px;
border-radius: 50%;
border: 2px solid var(--gold);
box-shadow: var(--gold-glow);
cursor: pointer;
overflow: hidden;
transition: transform 0.4s var(--ease-royal);
background: #121218;
display: flex;
align-items: center;
justify-content: center;
}
.profile-trigger:active {
transform: scale3d(0.9, 0.9, 1);
}
.profile-trigger i {
color: var(--gold);
font-size: 1.1rem;
}
.chat-list {
flex: 1;
overflow-y: auto;
padding: 12px;
display: flex;
flex-direction: column;
gap: 8px;
}
.chat-item {
display: flex;
align-items: center;
padding: 14px;
border-radius: 16px;
cursor: pointer;
transition: background 0.3s cubic-bezier(0.25, 1, 0.5, 1), transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
background: rgba(255, 255, 255, 0.01);
border: 1px solid transparent;
will-change: transform, background;
}
.chat-item:hover {
background: rgba(250, 221, 133, 0.04);
border-color: rgba(250, 221, 133, 0.05);
}
.chat-item.active {
background: rgba(250, 221, 133, 0.08);
border-color: rgba(250, 221, 133, 0.2);
box-shadow: inset 0 0 15px rgba(250, 221, 133, 0.03);
}
.chat-avatar {
width: 50px;
height: 50px;
border-radius: 14px;
background: linear-gradient(135deg, #161622 0%, #252532 100%);
border: 1px solid rgba(250, 221, 133, 0.15);
display: flex;
align-items: center;
justify-content: center;
margin-left: 14px;
color: var(--gold);
font-size: 1.2rem;
}
.chat-details {
flex: 1;
display: flex;
flex-direction: column;
gap: 4px;
}
.chat-meta {
display: flex;
justify-content: space-between;
align-items: center;
}
.chat-name {
font-weight: 600;
font-size: 0.95rem;
color: var(--txt);
}
.chat-time {
font-size: 0.75rem;
color: var(--muted);
}
.chat-preview {
font-size: 0.85rem;
color: var(--muted);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 200px;
}
/* Main Workspace / Chat Core */
.main-chat {
display: flex;
flex-direction: column;
height: 100%;
position: relative;
background-color: var(--bg);
background-size: cover;
background-position: center;
transition: background-image 0.5s ease;
}
.chat-header {
height: 75px;
background: var(--panel);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-bottom: 1px solid rgba(250, 221, 133, 0.08);
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 24px;
z-index: 5;
}
.active-user-info {
display: flex;
align-items: center;
gap: 12px;
}
.active-user-title {
font-weight: 700;
font-size: 1.05rem;
color: var(--txt);
}
.active-user-status {
font-size: 0.8rem;
color: var(--gold);
opacity: 0.8;
}
.header-actions {
display: flex;
gap: 12px;
}
.action-btn {
width: 40px;
height: 40px;
border-radius: 12px;
background: rgba(255, 255, 255, 0.02);
border: 1px solid rgba(250, 221, 133, 0.1);
color: var(--gold);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.3s var(--ease-royal);
}
.action-btn:hover {
background: rgba(250, 221, 133, 0.1);
border-color: var(--gold);
box-shadow: var(--gold-glow);
}
/* Message Stream Core */
.message-stream {
flex: 1;
overflow-y: auto;
padding: 24px;
display: flex;
flex-direction: column;
gap: 16px;
will-change: scroll-position;
}
.msg-wrapper {
display: flex;
width: 100%;
animation: msgIn 0.4s var(--ease-royal) forwards;
will-change: transform, opacity;
}
@keyframes msgIn {
from { opacity: 0; transform: translate3d(0, 12px, 0); }
to { opacity: 1; transform: translate3d(0, 0, 0); }
}
.msg-wrapper.outgoing {
justify-content: flex-start;
}
.msg-wrapper.incoming {
justify-content: flex-end;
}
.msg-bubble {
max-width: 65%;
padding: 14px 18px;
border-radius: 22px;
position: relative;
line-height: 1.6;
font-size: 0.95rem;
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
}
.msg-wrapper.outgoing .msg-bubble {
background: linear-gradient(135deg, rgba(28, 28, 38, 0.95) 0%, rgba(18, 18, 24, 0.95) 100%);
border: 1px solid rgba(250, 221, 133, 0.15);
color: var(--txt);
border-top-right-radius: 4px;
}
.msg-wrapper.incoming .msg-bubble {
background: linear-gradient(135deg, rgba(250, 221, 133, 0.15) 0%, rgba(223, 183, 62, 0.05) 100%);
border: 1px solid rgba(250, 221, 133, 0.25);
color: var(--gold);
border-top-left-radius: 4px;
}
.msg-time {
display: block;
font-size: 0.7rem;
margin-top: 6px;
text-align: left;
opacity: 0.6;
}
.msg-img {
max-width: 100%;
border-radius: 12px;
margin-bottom: 6px;
display: block;
}
/* Interaction Panel / Input Architecture */
.interaction-panel {
padding: 20px 24px;
background: var(--panel);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-top: 1px solid rgba(250, 221, 133, 0.08);
display: flex;
align-items: center;
gap: 14px;
z-index: 5;
}
.input-container {
flex: 1;
background: rgba(11, 11, 16, 0.6);
border: 1px solid rgba(250, 221, 133, 0.1);
border-radius: 16px;
padding: 2px 8px;
display: flex;
align-items: center;
transition: border-color 0.3s ease;
}
.input-container:focus-within {
border-color: var(--gold);
box-shadow: var(--gold-glow);
}
.main-input {
flex: 1;
background: transparent;
border: none;
outline: none;
padding: 14px;
color: var(--txt);
font-size: 0.95rem;
direction: rtl;
}
/* Structural Modals System */
.royal-modal {
position: fixed;
inset: 0;
background: rgba(3, 3, 5, 0.8);
backdrop-filter: blur(15px);
-webkit-backdrop-filter: blur(15px);
z-index: 200;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
pointer-events: none;
will-change: opacity;
transition: opacity 0.5s var(--ease-royal);
}
.royal-modal.active {
opacity: 1;
pointer-events: auto;
}
.modal-card {
background: var(--panel2);
border: 1px solid rgba(250, 221, 133, 0.2);
box-shadow: var(--gold-glow-strong);
width: 90%;
max-width: 450px;
border-radius: 28px;
padding: 32px;
transform: scale3d(0.9, 0.9, 1);
will-change: transform;
transition: transform 0.5s var(--ease-royal);
position: relative;
}
.royal-modal.active .modal-card {
transform: scale3d(1, 1, 1);
}
.close-modal-btn {
position: absolute;
top: 20px;
left: 20px;
background: transparent;
border: none;
color: var(--muted);
font-size: 1.2rem;
cursor: pointer;
transition: color 0.3s ease;
}
.close-modal-btn:hover {
color: var(--gold);
}
/* Identity Card / شناسنامه اختصاصی مبین */
.identity-header {
text-align: center;
margin-bottom: 24px;
}
.identity-avatar {
width: 90px;
height: 90px;
border-radius: 50%;
border: 3px solid var(--gold);
box-shadow: var(--gold-glow);
margin: 0 auto 14px auto;
display: flex;
align-items: center;
justify-content: center;
background: #0b0b10;
color: var(--gold);
font-size: 2.2rem;
}
.identity-title {
font-family: 'Cinzel', serif;
font-size: 1.5rem;
color: var(--gold);
margin-bottom: 4px;
}
.identity-subtitle {
font-size: 0.85rem;
color: var(--muted);
letter-spacing: 1px;
}
.identity-body {
display: flex;
flex-direction: column;
gap: 16px;
border-top: 1px solid rgba(250, 221, 133, 0.1);
padding-top: 20px;
}
.identity-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 8px 0;
border-bottom: 1px solid rgba(255, 255, 255, 0.02);
}
.identity-label {
font-size: 0.85rem;
color: var(--muted);
}
.identity-val {
font-size: 0.95rem;
font-weight: 600;
color: var(--txt);
}
.identity-val.gold-text {
color: var(--gold);
text-shadow: var(--gold-glow);
}
/* Toast Notifications */
.royal-toast {
position: fixed;
bottom: 110px;
right: 30px;
background: rgba(11, 11, 16, 0.95);
border: 1px solid var(--gold);
box-shadow: var(--gold-glow);
padding: 14px 24px;
border-radius: 16px;
color: var(--txt);
z-index: 1000;
transform: translate3d(0, 40px, 0);
opacity: 0;
will-change: transform, opacity;
transition: all 0.4s var(--ease-royal);
display: flex;
align-items: center;
gap: 10px;
font-size: 0.9rem;
}
.royal-toast.visible {
transform: translate3d(0, 0, 0);
opacity: 1;
}
/* Background Grid Selection */
.bg-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 12px;
margin-top: 20px;
}
.bg-option {
aspect-ratio: 1;
border-radius: 12px;
cursor: pointer;
border: 2px solid transparent;
background-size: cover;
background-position: center;
transition: all 0.3s ease;
}
.bg-option:hover {
transform: scale(1.05);
border-color: var(--gold);
}
/* Responsive Systems for Mobile Layouts */
@media(max-width: 768px) {
#appContainer {
grid-template-columns: 1fr;
}
.sidebar {
display: flex;
}
.main-chat {
display: none;
position: absolute;
inset: 0;
z-index: 20;
}
.main-chat.mobile-active {
display: flex;
}
}
</style>
</head>
<body>
<div id="luxurySplash">
<div class="splash-logo" id="splashLogo">WELCOME</div>

<script>
// DOM Core Utility Optimized for Speed
const $ = id => document.getElementById(id);
// Exact Requested API & Configuration Assembly Injection
const firebaseConfig = {
apiKey: "AIzaSyAZOVyp3r8rPsLHQDUOHsodNZA6BP_pEh0",
authDomain: "messagerin.firebaseapp.com",
projectId: "messagerin",
storageBucket: "messagerin.firebasestorage.app",
messagingSenderId: "1071488457159",
appId: "1:1071488457159:web:56c84b88f196ccbed1a1e2",
measurementId: "G-WN2SYBQN1W"
};
const IMGBB_API_KEY = "39ff6b8fa6551faed4ba25549faf1211";
// Initialize Firebase System Engine Securely
if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();
// Application Global State Engine
let activeChannel = "main_lounge";
let tracks = {};
// High-Performance Luxury Splash Execution Sequencer
window.addEventListener('DOMContentLoaded', () => {
const logo = $('splashLogo');
const sub = $('splashSubtitle');
const splash = $('luxurySplash');
const app = $('appContainer');
// Smooth Sequential Keyframe Layer Animations via GPU Threading
requestAnimationFrame(() => {
logo.style.opacity = '1';
logo.style.transform = 'scale3d(1, 1, 1)';
logo.style.transition = 'all 1.4s var(--ease-royal)';
setTimeout(() => {
sub.style.opacity = '1';
sub.style.transform = 'translate3d(0, 0, 0)';
sub.style.transition = 'all 1s var(--ease-royal)';
}, 400);
});
// Elegant Transition To Main System Workspace Interface
setTimeout(() => {
splash.style.opacity = '0';
splash.style.transform = 'scale3d(0.95, 0.95, 1)';
app.style.opacity = '1';
app.style.transform = 'scale3d(1, 1, 1)';
setTimeout(() => {
splash.style.display = 'none';
initApplicationServices();
}, 1200);
}, 2800);
});
// Modal Structural Controls
function openModal(id) {
$(id).classList.add('active');
}
function closeModal(id) {
$(id).classList.remove('active');
}
// Toast System Engine Architecture
function toast(message, icon = '✨') {
const container = $('toastContainer');
const notification = document.createElement('div');
notification.className = 'royal-toast';
notification.innerHTML = <span>${icon}</span><span>${message}</span>;
container.appendChild(notification);
requestAnimationFrame(() => {
notification.classList.add('visible');
});
setTimeout(() => {
notification.classList.remove('visible');
setTimeout(() => notification.remove(), 400);
}, 3500);
}
// Initialization & Live Streaming Operations
function initApplicationServices() {
setupChannels();
listenToChannel(activeChannel);
checkMobileLayout();
window.addEventListener('resize', checkMobileLayout);
}
function checkMobileLayout() {
if (window.innerWidth <= 768) {
$('backBtn').style.display = 'flex';
} else {
$('backBtn').style.display = 'none';
}
}
const channelsData = [
{ id: "main_lounge", name: "عمارت مرکزی ویرایپر", desc: "فرکانس پایداری ایمن", icon: "fa-fort-awesome" },
{ id: "dev_announcements", name: "پایگاه توسعه (سیستم)", desc: "بروزرسانی‌های هسته ۴.۰", icon: "fa-code-branch" }
];
function setupChannels() {
const container = $('chatsContainer');
container.innerHTML = '';
channelsData.forEach(ch => {
const el = document.createElement('div');
el.className = chat-item ${ch.id === activeChannel ? 'active' : ''};
el.id = ch-${ch.id};
el.onclick = () => switchChannel(ch.id, ch.name, ch.desc);
el.innerHTML = <div class="chat-avatar"><i class="fa-solid ${ch.icon}"></i></div> <div class="chat-details"> <div class="chat-meta"> <span class="chat-name">${ch.name}</span> <span class="chat-time">سیستم</span> </div> <div class="chat-preview">${ch.desc}</div> </div>;
container.appendChild(el);
});
}
function switchChannel(id, name, desc) {
if(activeChannel === id) return;
document.querySelectorAll('.chat-item').forEach(e => e.classList.remove('active'));
$(ch-${id}).classList.add('active');
activeChannel = id;
$('activeChatTitle').innerText = name;
$('activeChatStatus').innerText = desc;
if(window.innerWidth <= 768) {
$('mainChatWorkspace').classList.add('mobile-active');
}
listenToChannel(id);
}
function closeMobileChat() {
$('mainChatWorkspace').classList.remove('mobile-active');
}
// Realtime Stream Database Synchronization Handler
function listenToChannel(channelId) {
const stream = $('messageStream');
database.ref(channels/${channelId}/messages).off();
stream.innerHTML = '';
database.ref(channels/${channelId}/messages).limitToLast(50).on('child_added', (snapshot) => {
const data = snapshot.val();
renderMessage(data);
});
}
function renderMessage(data) {
const stream = $('messageStream');
const isMe = data.senderId === "Mobin";
const wrapper = document.createElement('div');
wrapper.className = msg-wrapper ${isMe ? 'outgoing' : 'incoming'};
let mediaContent = '';
if (data.imageUrl) {
mediaContent = <img src="${data.imageUrl}" class="msg-img" alt="تصویر پیوست" loading="lazy">;
}
wrapper.innerHTML = <div class="msg-bubble"> <div style="font-size:0.75rem; color:var(--gold); margin-bottom:4px; font-weight:700;">${data.senderName}</div> ${mediaContent} <div>${data.text || ''}</div> <span class="msg-time">${data.time || '۰۰:۰۰'}</span> </div>;
stream.appendChild(wrapper);
// Highly-Optimized Scrolling to ensure maximum framerate rendering
requestAnimationFrame(() => {
stream.scrollTop = stream.scrollHeight;
});
}
// Dispatch Communication Engine
function sendMessage() {
const input = $('msgInput');
const text = input.value.trim();
if (!text) return;
const now = new Date();
const timeString = now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit', hour12: false });
const msgData = {
senderId: "Mobin",
senderName: "مبین",
text: text,
time: timeString,
timestamp: firebase.database.ServerValue.TIMESTAMP
};
database.ref(channels/${activeChannel}/messages).push(msgData);
input.value = '';
}
// ImgBB Secure Multi-threaded High-Speed Image Direct Upload Architecture
async function uploadAndSendImage(event) {
const file = event.target.files[0];
if (!file) return;
toast("در حال بارگذاری مدیا در عمارت کلاود...", "⏳");
const formData = new FormData();
formData.append("image", file);
try {
const response = await fetch(https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}, {
method: "POST",
body: formData
});
const result = await response.json();
if (result.success) {
const imageUrl = result.data.url;
const now = new Date();
const timeString = now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit', hour12: false });
const msgData = {
senderId: "Mobin",
senderName: "مبین",
imageUrl: imageUrl,
text: "",
time: timeString,
timestamp: firebase.database.ServerValue.TIMESTAMP
};
database.ref(channels/${activeChannel}/messages).push(msgData);
toast("تصویر با موفقیت ارسال شد", "🖼️");
} else {
toast("خطا در بارگذاری تصویر", "❌");
}
} catch (error) {
console.error(error);
toast("ارتباط با ابر سرور ناموفق بود", "❌");
}
}
// Atmospheric Environment Background Customization
function selectBackground(bg) {
const workspace = $('mainChatWorkspace');
workspace.style.backgroundImage = bg.includes('url') ? bg : 'none';
workspace.style.backgroundColor = bg.includes('url') ? 'transparent' : bg;
closeModal('bgModal');
toast('پرده‌خوانی عمارت تغییر کرد', '🖼️');
}
// Global Multi-key Interaction Hooks
$('msgInput').addEventListener('keydown', (e) => {
if (e.key === 'Enter' && !e.shiftKey) {
e.preventDefault();
sendMessage();
}
});
</script>
</body>
</html>
