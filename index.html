
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIRIPER | Communication OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- FONTS & RESET ----- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4A6;
            --gold-dark: #8B6914;
            --obsidian: #0A0A0F;
            --obsidian-light: #1A1A2E;
            --obsidian-lighter: #2A2A3E;
            --glass-bg: rgba(20, 20, 35, 0.65);
            --glass-border: rgba(212, 175, 55, 0.25);
            --glass-shadow: 0 25px 45px rgba(0, 0, 0, 0.7);
            --blur-amount: 20px;
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
            --glow-pulse: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--obsidian);
            color: #F0E6D2;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(26, 26, 46, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(42, 42, 62, 0.6) 0%, transparent 50%);
        }

        /* ----- GLASS EFFECTS ----- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: -24px;
            box-shadow: var(--glass-shadow);
        }

        .glass-thin {
            background: rgba(30, 30, 45, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, III, 0.15);
        }

        /* ----- AUTH SCREEN ----- */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: radial-gradient(ellipse at center, #0A0A0F 0%, #000000 100%);
        }

        .auth-container {
            width: 100%;
            max-width: -480px;
            padding: 3rem;
            border-radius: 32px;
            animation: floatIn 0.8s var(--transition-smooth);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        }

        .auth-subtitle {
            color: #B8B0A0;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .input-group {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(15, 15, 25, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            color: #F0E6D2;
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.3s var(--transition-smooth);
            outline: none;
        }

        .input-field:focus {
            border-color: var(--gold);
            box-shadow: var(--glow-pulse);
            background: rgba(25, 25, 40, 0.9);
            transform: translateY(-2px);
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--obsidian);
            padding: 0 8px;
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 500;
        }

        .auth-btn {
            padding: 1.2rem 2rem;
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(139, 105, 20, 0.1));
            border: 1px solid var(--gold);
            border-radius: 20px;
            color: var(--gold-light);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.25), rgba(139, 105, 20, 0.2));
            box-shadow: var(--glow-pulse);
            transform: translateY(-3px);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 2rem;
            color: #8A7E6A;
            font-size: 0.95rem;
        }

        .auth-toggle span {
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            margin-left: 5px;
            transition: color 0.2s;
        }

        .auth-toggle span:hover {
            color: var(--gold-light);
        }

        .auth-error {
            color: #FF6B6B;
            text-align: center;
            font-size: 0.9rem;
            margin-top: 1rem;
            min-height: 20px;
        }

        /* ----- MAIN OS LAYOUT ----- */
        .os-dashboard {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .os-dashboard.active {
            display: flex;
            opacity: 1;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            height: 100%;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(212, 175, 55, 0.1);
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: -100;
        }

        .logo-container {
            margin-bottom: 3rem;
            padding-left: 0.5rem;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .logo-subtitle {
            font-size: 0.8rem;
            color: #8A7E6A;
            letter-spacing: 3px;
            margin-top: -5px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            border-radius: 16px;
            color: #B8B0A0;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.6s;
        }

        .nav-item:hover::before {
            left: 100%;
        }

        .nav-item:hover {
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold-light);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border-left: 3px solid var(--gold);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15);
        }

        .nav-icon {
            width: 24px;
            text-align: center;
            font-size: 1.2rem;
        }

        .nav-text {
            font-size: 0.95rem;
        }

        .user-profile {
            margin-top: auto;
            padding: 1.5rem;
            border-radius: 16px;
            background: rgba(20, 20, 35, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--obsidian);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: var(--gold-light);
        }

        .user-status {
            font-size: 0.8rem;
            color: #8A7E6A;
        }

        .logout-btn {
            color: #8A7E6A;
            cursor: pointer;
            transition: color 0.2s;
        }

        .logout-btn:hover {
            color: var(--gold);
        }

        /* MAIN PANEL */
        .main-panel {
            flex: 1;
            height: 100%;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .panel-header {
            margin-bottom: 2rem;
        }

        .panel-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold-light);
            margin-bottom: 0.5rem;
        }

        .panel-subtitle {
            color: #8A7E6A;
            font-size: 1rem;
        }

        /* DASHBOARD GRID */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .dashboard-card {
            padding: 1.8rem;
            border-radius: 24px;
            transition: all 0.3s var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), var(--glow-pulse);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gold-light);
        }

        .card-icon {
            color: var(--gold);
            font-size: 1.5rem;
        }

        .card-content {
            color: #C8C0B0;
            line-height: 1.6;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold);
            margin: 1rem 0;
        }

        /* MESSAGES UI */
        .messages-container {
            display: flex;
            height: calc(100vh - 120px);
            gap: 1.5rem;
        }

        .conversations-list {
            width: 320px;
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: -1rem;
        }

        .conversation-item {
            padding: 1rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .conversation-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .conversation-item.active {
            background: rgba(212, 175, 55, 0.15);
            border-left: 3px solid var(--gold);
        }

        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2A2A3E, #1A1A2E);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-weight: 600;
        }

        .conversation-info {
            flex: 1;
        }

        .conversation-name {
            font-weight: 600;
            color: var(--gold-light);
        }

        .conversation-preview {
            font-size: 0.9rem;
            color: #8A7E6A;
            margin-top: 2px;
        }

        .chat-window {
            flex: 1;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            padding: 1rem 1.2rem;
            border-radius: 18px;
            position: relative;
            animation: messageIn 0.3s var(--transition-smooth);
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(139, 105, 20, 0.15));
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .message.received {
            align-self: flex-start;
            background: rgba(30, 30, 45, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .message-time {
            font-size: 0.75rem;
            color: #8A7E6A;
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-container {
            padding: 1.5rem;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: rgba(20, 20, 35, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            color: #F0E6D2;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .send-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 16px;
            color: var(--obsidian);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--glow-pulse);
        }

        /* KINGDOMS UI */
        .kingdoms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .kingdom-card {
            padding: 2rem;
            border-radius: 24px;
            transition: all 0.3s var(--transition-smooth);
            cursor: pointer;
        }

        .kingdom-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), var(--glow-pulse);
        }

        .kingdom-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--obsidian);
            font-size: 1.8rem;
        }

        .kingdom-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold-light);
            margin-bottom: 0.5rem;
        }

        .kingdom-members {
            font-size: 0.9rem;
            color: #8A7E6A;
            margin-bottom: 1rem;
        }

        .join-btn {
            padding: 0.8rem 1.5rem;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            border-radius: 12px;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .join-btn:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        /* AI CORE UI */
        .ai-container {
            display: flex;
            height: calc(100vh - 120px);
            gap: 1.5rem;
        }

        .ai-sidebar {
            width: IIIpx;
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ai-command {
            padding: 1rem;
            border-radius: 16px;
            background: rgba(30, 30, 45, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-command:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateX(5px);
        }

        .ai-chat {
            flex: 1;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
        }

        /* COMMAND PALETTE */
        .command-palette {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 600px;
            max-width: 90vw;
            border-radius: 24px;
            padding: 2rem;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s var(--transition-smooth);
        }

        .command-palette.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .command-input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(15, 15, 25, 0.9);
            border: 1px solid var(--gold);
            border-radius: 16px;
            color: var(--gold-light);
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 1.5rem;
        }

        .command-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .command-item {
            padding: 1rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .command-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .command-icon {
            color: var(--gold);
            width: 24px;
        }

        /* ANIMATIONS */
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 20, 35, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-light);
        }

        /* UTILITY CLASSES */
        .hidden {
            display: none !important;
        }

        .text-gold {
            color: var(--gold) !important;
        }

        .text-gold-light {
            color: var(--gold-light) !important;
        }

        .mb-1 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 2rem; }
        .mt-1 { margin-top: 1rem; }
        .mt-2 { margin-top: 2rem; }

        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .sidebar {
                width: 240px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .messages-container {
                flex-direction: column;
            }
            
            .conversations-list {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- AUTHENTICATION SCREEN -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-container glass">
            <div class="auth-header">
                <div class="auth-title">WIRIPER</div>
                <div class="auth-subtitle">COMMUNICATION OS</div>
            </div>
            
            <div class="auth-form" id="authForm">
                <div class="input-group">
                    <div class="input-label">Username</div>
                    <input type="text" id="authUsername" class="input-field" placeholder="Enter your royal name" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <div class="input-label">Password</div>
                    <input type="password" id="authPassword" class="input-field" placeholder="Your secret key">
                </div>
                
                <button id="authButton" class="auth-btn">Enter the Realm</button>
                
                <div class="auth-toggle">
                    <span id="authToggle">Create new identity</span>
                </div>
                
                <div id="authError" class="auth-error"></div>
            </div>
        </div>
    </div>

    <!-- MAIN OS DASHBOARD -->
    <div id="osDashboard" class="os-dashboard">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo-container">
                <div class="logo">WIRIPER</div>
                <div class="logo-subtitle">COMMUNICATION OS</div>
            </div>
            
            <div class="nav-menu" id="navMenu">
                <!-- Navigation items will be injected here -->
            </div>
            
            <div class="user-profile glass-thin">
                <div class="user-avatar" id="userAvatar">W</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Welcome</div>
                    <div class="user-status">Online • Level 24</div>
                </div>
                <div class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                </div>
            </div>
        </div>
        
        <!-- MAIN CONTENT AREA -->
        <div class="main-panel">
            <div id="contentArea">
                <!-- Dynamic content will be injected here -->
            </div>
        </div>
    </div>

    <!-- COMMAND PALETTE -->
    <div id="commandPalette" class="command-palette glass">
        <input type="text" id="commandInput" class="command-input" placeholder="Type a command... (Press ESC to close)">
        <div class="command-list" id="commandList">
            <!-- Command items will be injected here -->
        </div>
    </div>

    <!-- FIREBASE & IMGBB CONFIGURATION -->
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAZOVyp3r8rPsLHQDUOHsodNZA6BP_pEh0",
            authDomain: "messagerin.firebaseapp.com",
            projectId: "messagerin",
            storageBucket: "messagerin.firebasestorage.app",
            messagingSenderId: "1071488457159",
            appId: "1:1071488457159:web:56c84b88f196ccbed1a1e2",
            measurementId: "G-WN2SYBQN1W"

        function authenticate() {
            const username = authUsername.value.trim();
            const password = authPassword.value.trim();

            if (!username || !password) {
                authError.textContent = 'Please fill all fields';
                return;
            }

            const users = JSON.parse(localStorage.getItem('wir_users') || '[]');

            if (isLoginMode) {
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    loginSuccess(user);
                } else {
                    authError.textContent = 'Invalid credentials';
                }
            } else {
                if (users.find(u => u.username === username)) {
                    authError.textContent = 'Username already exists';
                    return;
                }
                const newUser = {
                    id: generateId(),
                    username,
                    password,
                    createdAt: new Date().toISOString(),
                    level: 1,
                    credits: 1000
                };
                users.push(newUser);
                localStorage.setItem('wir_users', JSON.stringify(users));
                loginSuccess(newUser);
            }

        // Command palette functions
        function toggleCommandPalette() {
            state.commandPaletteOpen = !state.commandPaletteOpen;
            commandPalette.classList.toggle('active', state.commandPaletteOpen);
            
            if (state.commandPaletteOpen) {
                commandInput.focus();
                renderCommandList();
            }
        }

        function renderCommandList() {
            commandList.innerHTML = '';
            commands.forEach(cmd => {
                const item = document.createElement('div');
                item.className = 'command-item';
                item.innerHTML = `
                    <div class="command-icon">${cmd.icon}</div>
                    <div>
                        <div style="font-weight: 600; color: var(--gold-light);">${cmd.label}</div>
                        <div style="font-size: 0.9rem; color: #8A7E6A;">Press Enter to execute</div>
                    </div>
                `;
                item.addEventListener('click', cmd.action);
                commandList.appendChild(item);
            });
        }

        // Utility functions
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        function showNotification(message) {
            // Create notification element
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 1rem 1.5rem;
                background: rgba(20, 20, 35, 0.9);
                backdrop-filter: blur(20px);
                border: 1px solid var(--gold);
                border-radius: IIIpx;
                color: var(--gold-light);
                font-weight: 500;
                z-index: 10000;
                animation: floatIn 0.3s ease;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Remove after 3 seconds
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Event listeners
        authButton.addEventListener('click', authenticate);
        authToggle.addEventListener('click', toggleAuthMode);
        logoutBtn.addEventListener('click', logout);

        // Command palette keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl+K or Cmd+K to open command palette
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                toggleCommandPalette();
            }
            
            // ESC to close command palette
            if (e.key === 'Escape' && state.commandPaletteOpen) {
                toggleCommandPalette();
            }
            
            // Slash (/) to open command palette
            if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                if (!state.commandPaletteOpen) {
                    toggleCommandPalette();
                }
            }
        });

        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const value = commandInput.value.trim().toLowerCase();
                if (value) {
                    // Find matching command
                    const cmd = commands.find(c => 
                        c.label.toLowerCase().includes(value) || 
                        c.id.includes(value)
                    );
                    if (cmd) {
                        cmd.action();
                        toggleCommandPalette();
                    }
                }
            }
        });

        // Initialize the application
        function init() {
            initializeStorage();
            
            // Check for existing session
            const session = localStorage.getItem('wir_session');
            if (session) {
                try {
                    state.currentUser = JSON.parse(session);
                    userAvatar.textContent = state.currentUser.username.charAt(0).toUpperCase();
                    userName.textContent = state.currentUser.username;
                    
                    authScreen.classList.add('hidden');
                    osDashboard.classList.add('active');
                    
                    initializeNavigation();
                    navigateTo('home');
                } catch (e) {
                    localStorage.removeItem('wir_session');
                }
            }
            
            // Add some sample conversations if none exist
            if (!localStorage.getItem('wir_conversations') || JSON.parse(localStorage.getItem('wir_conversations')).length === 0) {
                const sampleConversations = [

            }
        }
