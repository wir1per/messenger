<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08040a">
  <meta name="description" content="Wiriper Prime — messenger future luxury edition">
  <title>Wiriper Prime | Private Nexus</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.88em' font-size='88'>💠</text></svg>">
  <style>
    :root{
      --bg:#08040a;
      --bg2:#13070d;
      --bg3:#1c0d17;
      --panel:rgba(19,7,13,.72);
      --panel2:rgba(33,13,22,.9);
      --panel3:rgba(10,8,14,.92);
      --line:rgba(255,255,255,.08);
      --line2:rgba(231,199,138,.18);
      --text:#f5f2f4;
      --muted:rgba(227,221,225,.68);
      --muted2:rgba(227,221,225,.44);
      --accent:#e7c78a;
      --accent2:#7fd6ff;
      --accent3:#b67bff;
      --success:#7ef0b6;
      --danger:#ff6c74;
      --me:linear-gradient(150deg,rgba(231,199,138,.18),rgba(176,108,70,.14) 45%,rgba(11,9,12,.92));
      --them:linear-gradient(150deg,rgba(255,255,255,.04),rgba(28,13,23,.94));
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --shadow2:0 8px 24px rgba(0,0,0,.35);
      --shadow3:0 0 0 1px rgba(255,255,255,.03), 0 22px 64px rgba(0,0,0,.6);
      --r-sm:12px;
      --r-md:18px;
      --r-lg:24px;
      --r-xl:32px;
      --ease:cubic-bezier(.2, .8, .2, 1);
      --ease2:cubic-bezier(.34, 1.56, .64, 1);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --font-xs:11px;
      --font-sm:12px;
      --font-md:14px;
      --font-lg:16px;
      --font-xl:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Tahoma,sans-serif}
    body{touch-action:manipulation}
    button,input,textarea,select{font:inherit;color:inherit;border:0;outline:0;background:none}
    img{max-width:100%;display:block;-webkit-user-drag:none;user-select:none}
    ::selection{background:rgba(231,199,138,.3)}
    ::-webkit-scrollbar{width:7px;height:7px}
    ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,rgba(231,199,138,.35),rgba(127,214,255,.25));border-radius:999px}
    ::-webkit-scrollbar-track{background:transparent}

    body::before,body::after{
      content:"";
      position:fixed;inset:-20%;
      pointer-events:none;
      z-index:0;
    }
    body::before{
      background:
        radial-gradient(circle at 20% 10%, rgba(127,214,255,.12), transparent 28%),
        radial-gradient(circle at 80% 8%, rgba(231,199,138,.12), transparent 25%),
        radial-gradient(circle at 70% 80%, rgba(182,123,255,.1), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.015), transparent 32%, rgba(255,255,255,.01));
      filter: blur(4px);
      animation: drift 24s ease-in-out infinite alternate;
    }
    body::after{
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity:.25;
      mix-blend-mode:screen;
      mask-image: radial-gradient(circle at center, black 0%, black 62%, transparent 100%);
    }
    @keyframes drift{
      0%{transform:translate3d(0,0,0) scale(1)}
      100%{transform:translate3d(2%, -1%, 0) scale(1.02)}
    }

    .app-shell{position:relative;z-index:1;height:100%;isolation:isolate}
    .hidden{display:none !important}
    .visually-hidden{position:absolute !important;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

    .glass{
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow3);
      backdrop-filter: blur(28px) saturate(140%);
      -webkit-backdrop-filter: blur(28px) saturate(140%);
    }

    .splash{
      position:fixed;inset:0;z-index:1000;
      display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle at 50% 20%, rgba(86,58,72,.7), rgba(8,4,10,.98) 56%, #040205 100%);
      transition:opacity .55s var(--ease),visibility .55s var(--ease);
      overflow:hidden;
    }
    .splash.hide{opacity:0;visibility:hidden;pointer-events:none}
    .splash-card{position:relative;text-align:center;padding:32px 28px}
    .splash-ring{
      position:absolute;inset:50% auto auto 50%;
      width:360px;height:360px;border-radius:50%;
      transform:translate(-50%,-50%);
      border:1px solid rgba(231,199,138,.16);
      box-shadow:0 0 0 1px rgba(127,214,255,.05), inset 0 0 40px rgba(127,214,255,.08);
      animation: pulse 4.2s ease-in-out infinite;
    }
    .splash-ring::before,.splash-ring::after{
      content:"";position:absolute;inset:18px;border-radius:50%;
      border:1px solid rgba(255,255,255,.03);
    }
    .splash-ring::after{inset:42px;border-color:rgba(231,199,138,.12)}
    @keyframes pulse{
      0%,100%{transform:translate(-50%,-50%) scale(.9);opacity:.65}
      50%{transform:translate(-50%,-50%) scale(1.08);opacity:1}
    }
    .brand-mark{
      width:92px;height:92px;margin:0 auto 18px;border-radius:28px;
      display:grid;place-items:center;
      background:linear-gradient(145deg, rgba(255,255,255,.08), rgba(231,199,138,.08) 36%, rgba(127,214,255,.12));
      border:1px solid rgba(231,199,138,.22);
      box-shadow:0 0 0 1px rgba(255,255,255,.04), 0 20px 80px rgba(0,0,0,.45), 0 0 36px rgba(231,199,138,.12);
    }
    .brand-mark .brand-emoji{width:48px;height:48px}
    .splash h1{font-size:clamp(34px,5vw,50px);letter-spacing:.02em;font-weight:800}
    .gradient-text{
      background:linear-gradient(90deg, #f7f0df, #e7c78a 25%, #f8fbff 48%, #7fd6ff 72%, #f2d7a1 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
      background-size:200% auto;animation:shine 6s linear infinite;
    }
    @keyframes shine{to{background-position:200% center}}
    .splash p{margin-top:10px;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--accent)}
    .splash-stars{margin-top:24px;display:flex;gap:10px;justify-content:center}
    .splash-stars i{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px rgba(231,199,138,.8);animation: floaty 1.8s ease-in-out infinite}
    .splash-stars i:nth-child(2){animation-delay:.18s}
    .splash-stars i:nth-child(3){animation-delay:.36s}
    .splash-stars i:nth-child(4){animation-delay:.54s}
    @keyframes floaty{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-12px);opacity:1}}

    .auth-screen,.app-screen{
      position:fixed;inset:0;z-index:10;
    }
    .auth-screen{
      display:flex;align-items:center;justify-content:center;
      padding:20px;
      background:radial-gradient(circle at top, rgba(95,55,69,.48), transparent 32%), linear-gradient(180deg, rgba(6,4,8,.9), rgba(6,4,8,.98));
    }
    .auth-card{
      width:min(420px,100%);
      border-radius:var(--r-xl);
      padding:28px;
      position:relative;
      overflow:hidden;
    }
    .auth-card::before{
      content:"";position:absolute;inset:-1px;
      background:linear-gradient(135deg, rgba(231,199,138,.15), rgba(127,214,255,.06), rgba(182,123,255,.12));
      opacity:.55;filter:blur(26px);pointer-events:none;
    }
    .auth-inner{position:relative;z-index:1}
    .auth-top{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px}
    .auth-badge{
      width:46px;height:46px;border-radius:16px;display:grid;place-items:center;
      background:linear-gradient(145deg, rgba(255,255,255,.08), rgba(231,199,138,.15));
      border:1px solid rgba(231,199,138,.25);
      box-shadow:0 18px 40px rgba(0,0,0,.24);
    }
    .auth-badge .brand-emoji{width:28px;height:28px}
    .auth-title{font-size:30px;font-weight:850;line-height:1.05;text-align:center}
    .auth-sub{margin-top:8px;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);text-align:center}
    .tabs{display:flex;gap:6px;padding:6px;border-radius:18px;background:rgba(0,0,0,.28);border:1px solid var(--line);margin:20px 0}
    .tabs button{
      flex:1;min-height:46px;padding:0 14px;border-radius:14px;color:var(--muted);
      font-weight:700;transition:transform .25s var(--ease), background .25s var(--ease), color .25s var(--ease), box-shadow .25s var(--ease);
    }
    .tabs button.active{
      background:linear-gradient(135deg, rgba(231,199,138,.22), rgba(127,214,255,.14));
      color:var(--text);
      box-shadow:inset 0 0 0 1px rgba(231,199,138,.18), 0 8px 22px rgba(0,0,0,.25);
    }
    .field{margin-bottom:14px}
    .label{display:block;margin:0 0 8px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
    .input, .textarea{
      width:100%;border-radius:16px;min-height:48px;
      padding:14px 16px;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.09);
      color:var(--text);transition:box-shadow .22s var(--ease), border-color .22s var(--ease), transform .22s var(--ease);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .textarea{min-height:92px;resize:none}
    .input:focus,.textarea:focus{
      border-color:rgba(231,199,138,.4);
      box-shadow:0 0 0 4px rgba(231,199,138,.08), 0 0 0 1px rgba(127,214,255,.08), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .primary-btn{
      min-height:50px;padding:0 18px;border-radius:16px;
      background:linear-gradient(135deg, #f3dfad, #e7c78a 36%, #f7f2e9 72%);
      color:#151010;font-weight:850;letter-spacing:.12em;text-transform:uppercase;
      box-shadow:0 16px 36px rgba(0,0,0,.32), 0 0 18px rgba(231,199,138,.2);
      transition:transform .25s var(--ease2), box-shadow .25s var(--ease);
    }
    .primary-btn:hover{transform:translateY(-2px);box-shadow:0 22px 50px rgba(0,0,0,.4), 0 0 28px rgba(231,199,138,.32)}
    .ghost-btn{
      min-height:44px;padding:0 16px;border-radius:14px;background:rgba(255,255,255,.03);
      color:var(--text);border:1px solid rgba(255,255,255,.08);
    }
    .msg-line{margin-top:10px;min-height:20px;font-size:12px;text-align:center;color:var(--muted)}
    .msg-line.ok{color:var(--accent)}
    .msg-line.err{color:var(--danger)}

    .layout{height:100%;display:flex;position:relative;z-index:2}
    .sidebar{
      width:390px;min-width:320px;max-width:440px;height:100%;
      display:flex;flex-direction:column;background:linear-gradient(180deg, rgba(17,8,14,.82), rgba(9,6,11,.95));
      border-left:1px solid rgba(255,255,255,.06);
      position:relative;z-index:3;overflow:hidden;
    }
    .side-top{
      padding:calc(14px + var(--safe-top)) 16px 14px;
      background:linear-gradient(180deg, rgba(24,11,18,.9), rgba(13,8,12,.78));
      border-bottom:1px solid var(--line);
      display:flex;align-items:center;gap:12px;
      backdrop-filter:blur(24px);
    }
    .avatar-wrap{
      position:relative;flex:0 0 auto;width:50px;height:50px;border-radius:50%;
      border:1px solid rgba(231,199,138,.24);
      box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 12px 28px rgba(0,0,0,.3);
      overflow:hidden;background:linear-gradient(145deg, rgba(255,255,255,.08), rgba(231,199,138,.08));
    }
    .avatar-wrap.large{width:108px;height:108px}
    .avatar-wrap.small{width:44px;height:44px}
    .avatar-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
    .avatar-fallback{
      position:absolute;inset:0;display:grid;place-items:center;
      background:linear-gradient(145deg, rgba(255,255,255,.07), rgba(231,199,138,.12), rgba(127,214,255,.1));
      color:#fff;font-weight:900;
    }
    .avatar-wrap.has-image .avatar-img{display:block}
    .avatar-wrap.has-image .avatar-fallback{display:none}
    .avatar-wrap img, .avatar-wrap .avatar-fallback{border-radius:50%}
    .avatar-fallback .emoji-icon{width:52%;height:52%}
    .avatar-fallback .initial{
      font-size:18px;letter-spacing:.08em;color:var(--text);text-shadow:0 2px 12px rgba(0,0,0,.38)
    }
    .me-meta{min-width:0;flex:1}
    .me-name{
      display:flex;align-items:center;gap:6px;font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .me-id{margin-top:3px;font-size:11px;letter-spacing:.18em;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-actions{display:flex;align-items:center;gap:8px}
    .icon-btn{
      width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
      background:rgba(255,255,255,.03);color:var(--text);
      border:1px solid rgba(255,255,255,.08);
      transition:transform .22s var(--ease), background .22s var(--ease), border-color .22s var(--ease);
    }
    .icon-btn:hover{transform:translateY(-1px);background:rgba(231,199,138,.1);border-color:rgba(231,199,138,.28)}
    .icon-dots{font-size:20px;line-height:1}
    .search-row{padding:14px 16px 12px}
    .search{
      width:100%;min-height:48px;border-radius:16px;padding:0 16px;
      background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.09);color:var(--text)
    }
    .search:focus{border-color:rgba(127,214,255,.25);box-shadow:0 0 0 4px rgba(127,214,255,.06)}
    .tabs-2{display:flex;gap:8px;padding:0 16px 12px}
    .tabs-2 button{
      flex:1;min-height:42px;border-radius:14px;background:rgba(255,255,255,.03);
      color:var(--muted);border:1px solid rgba(255,255,255,.06);font-weight:700;
      transition:background .22s var(--ease), transform .22s var(--ease), color .22s var(--ease);
    }
    .tabs-2 button.active{
      background:linear-gradient(135deg, rgba(231,199,138,.16), rgba(127,214,255,.08));
      color:var(--text);
      border-color:rgba(231,199,138,.18)
    }
    .section-label{
      padding:10px 16px 8px;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted2);
      border-top:1px solid rgba(255,255,255,.04)
    }
    .list{
      flex:1;overflow:auto;padding:0 10px 14px;
    }
    .item{
      display:flex;align-items:center;gap:12px;
      padding:12px 12px;border-radius:20px;margin-bottom:8px;cursor:pointer;
      transition:transform .22s var(--ease), background .22s var(--ease), border-color .22s var(--ease), box-shadow .22s var(--ease);
      border:1px solid transparent;
    }
    .item:hover{background:rgba(255,255,255,.03);transform:translateY(-1px)}
    .item.active{
      background:linear-gradient(135deg, rgba(231,199,138,.12), rgba(127,214,255,.06));
      border-color:rgba(231,199,138,.2);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03), 0 18px 44px rgba(0,0,0,.28);
    }
    .item .avatar-wrap{width:48px;height:48px}
    .item-meta{min-width:0;flex:1}
    .item-head{display:flex;align-items:center;gap:8px;justify-content:space-between}
    .item-name{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-time{font-size:10px;color:var(--muted2);flex:0 0 auto}
    .item-last{margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
    .status-dot{
      width:9px;height:9px;border-radius:999px;background:var(--success);box-shadow:0 0 12px rgba(126,240,182,.7);flex:0 0 auto
    }
    .badge{
      min-width:22px;height:22px;border-radius:999px;padding:0 7px;
      display:inline-flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg, #f3dfad, #e7c78a);
      color:#160f0f;font-size:11px;font-weight:900;
      box-shadow:0 8px 18px rgba(0,0,0,.22);
    }
    .discover-card{
      margin:0 10px 10px;padding:14px;border-radius:22px;
      background:linear-gradient(145deg, rgba(255,255,255,.04), rgba(231,199,138,.05));
      border:1px solid rgba(231,199,138,.12);
      box-shadow:0 20px 50px rgba(0,0,0,.18)
    }
    .discover-title{font-size:13px;font-weight:800}
    .discover-sub{margin-top:4px;font-size:12px;color:var(--muted);line-height:1.5}
    .discover-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .pill{
      min-height:40px;padding:0 14px;border-radius:14px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text)
    }
    .pill.primary{
      background:linear-gradient(135deg, rgba(231,199,138,.16), rgba(127,214,255,.08));
      border-color:rgba(231,199,138,.18)
    }

    .chat-panel{
      flex:1;min-width:0;height:100%;
      display:flex;flex-direction:column;
      position:relative;background:
      radial-gradient(circle at 50% 0%, rgba(95,45,62,.2), transparent 30%),
      linear-gradient(180deg, #0b060b, #050406 68%, #050406);
      overflow:hidden;
    }
    .chat-header{
      position:relative;z-index:3;
      display:flex;align-items:center;gap:12px;
      padding:calc(12px + var(--safe-top)) 16px 12px;
      background:linear-gradient(180deg, rgba(24,11,18,.86), rgba(18,9,14,.66));
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      box-shadow:0 12px 40px rgba(0,0,0,.22);
    }
    .back-btn{
      width:42px;height:42px;border-radius:14px;display:none;align-items:center;justify-content:center;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);font-size:18px;
    }
    .chat-meta{min-width:0;flex:1;display:flex;align-items:center;gap:12px}
    .chat-title{
      font-size:16px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    .chat-sub{
      margin-top:3px;font-size:11px;color:var(--muted);letter-spacing:.12em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    .header-actions{display:flex;gap:8px;flex:0 0 auto}
    .round{
      width:40px;height:40px;border-radius:14px;display:grid;place-items:center;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
      transition:transform .22s var(--ease), background .22s var(--ease), border-color .22s var(--ease);
    }
    .round:hover{transform:translateY(-1px);background:rgba(231,199,138,.09);border-color:rgba(231,199,138,.22)}

    .pinned{
      display:none;padding:10px 16px;
      background:linear-gradient(135deg, rgba(231,199,138,.1), rgba(127,214,255,.06));
      border-bottom:1px solid rgba(231,199,138,.18);
      color:var(--text);
    }
    .pinned .small{font-size:10px;color:var(--accent);letter-spacing:.22em;text-transform:uppercase;font-weight:800}
    .pinned .txt{margin-top:3px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .messages{
      flex:1;overflow:auto;padding:18px 16px 16px;
      display:flex;flex-direction:column;gap:10px;
      scroll-behavior:smooth;
      position:relative;
    }
    .messages::before{
      content:"";position:absolute;inset:0;
      background:radial-gradient(circle at 50% 10%, rgba(127,214,255,.04), transparent 28%);
      pointer-events:none
    }
    .day-sep{
      align-self:center;padding:7px 14px;border-radius:999px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
      color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.12em;
      backdrop-filter:blur(18px)
    }
    .bubble-row{display:flex;gap:10px;max-width:min(86%, 720px);align-self:flex-end;animation:rise .24s var(--ease) both}
    .bubble-row.me{align-self:flex-start}
    @keyframes rise{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .bubble{
      position:relative;max-width:100%;padding:11px 13px 10px;border-radius:24px;
      background:var(--them);border:1px solid rgba(255,255,255,.08);
      box-shadow:0 14px 30px rgba(0,0,0,.22);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }
    .bubble.me{background:var(--me);border-color:rgba(231,199,138,.18)}
    .bubble:hover{box-shadow:0 20px 40px rgba(0,0,0,.28), 0 0 0 1px rgba(231,199,138,.06)}
    .sender{
      display:flex;align-items:center;gap:6px;
      margin-bottom:5px;font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.06em
    }
    .msg-text{

    .meta{

      margin-top:8px;display:block;max-width:280px;border-radius:18px;overflow:hidden;

    .file-ico{

    .file-name{font-size:12px;font-weight:800;word-break:break-all}

      min-height:28px;padding:0 10px;border-radius:999px;

    .profile-head{text-align:center;margin-bottom:18px}
    .profile-head .avatar-wrap{width:110px;height:110px;margin:0 auto 14px}
    .profile-name{font-size:22px;font-weight:850}

    .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

    .credit-box{

    .upload{
      display:flex;align-items:center;justify-content:space-between;gap:10px;

    }
    .upload input{display:none}
    .upload-label{
      min-height:42px;padding:0 14px;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer
    }
    .swatches{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .swatch{height:88px;border-radius:20px;border:1px solid rgba(255,255,255,.08);overflow:hidden;position:relative}
    .swatch span{position:absolute;inset:auto 12px 12px 12px;font-size:12px;font-weight:800;text-shadow:0 4px 14px rgba(0,0,0,.5)}
    .swatch.active{outline:2px solid rgba(231,199,138,.55);outline-offset:2px}
    .footer-note{margin-top:12px;font-size:12px;color:var(--muted);line-height:1.7}

    .brand-emoji,.emoji-icon{image-rendering:auto}
    .chat-header .avatar-wrap,.item .avatar-wrap,.side-top .avatar-wrap{flex:0 0 auto}
    .emoji-img{width:1em;height:1em;vertical-align:-.15em;display:inline-block}
    .reactions .emoji-img{width:16px;height:16px}

    @media (max-width: 920px){
      .sidebar{width:352px;min-width:290px}
      .chat-title{font-size:15px}
    }
    @media (max-width: 760px){
      .layout{display:block}
      .sidebar{width:100%;max-width:none;min-width:0}
      .chat-panel{
        position:fixed;inset:0;transform:translateX(-100%);transition:transform .28s var(--ease);z-index:30
      }
      .chat-panel.open{transform:translateX(0)}
      .back-btn{display:grid}
      .modal{margin:10vh auto 16px}
      .profile-grid{grid-template-columns:1fr}
      .emoji-picker{width:calc(100vw - 28px)}
    }
    @media (max-width: 460px){
      .auth-card{padding:20px;border-radius:28px}
      .auth-title{font-size:26px}
      .side-top{padding:calc(12px + var(--safe-top)) 12px 12px}
      .search-row,.tabs-2,.section-label,.list,.messages,.composer{padding-left:12px;padding-right:12px}
      .item{padding:10px}
      .item .avatar-wrap{width:44px;height:44px}
      .chat-header{padding:calc(10px + var(--safe-top)) 12px 10px}
      .composer{gap:8px}
      .send{width:48px;height:48px}
      .composer textarea{border-radius:18px}
      .menu-panel{inset-inline-start:12px;top:66px}
    }
    @media (prefers-reduced-motion: reduce){
      *{animation:none !important;transition:none !important;scroll-behavior:auto !important}
    }
  </style>
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-card">
      <div class="splash-ring"></div>
      <div class="brand-mark"><span id="splashMark"></span></div>

    </div>
  </div>

  <section id="authScreen" class="auth-screen">
    <div class="auth-card glass">
      <div class="auth-inner">
        <div class="auth-top">
          <div class="auth-badge"><span id="authMark"></span></div>
        </div>
        <div class="auth-title gradient-text">Wiriper Prime</div>

        <div class="tabs">
          <button id="loginTab" class="active" type="button" onclick="switchTab('login')">اتصال</button>
          <button id="registerTab" type="button" onclick="switchTab('register')">ایجاد هویت</button>
        </div>

        <div id="loginForm">

            <label class="label" for="loginUser">شناسه کاربری</label>

          </div>
          <div class="field">
            <label class="label" for="loginPass">کد امنیتی</label>
            <input class="input" id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••">
          </div>
          <button class="primary-btn" type="button" onclick="doLogin()">ورود</button>
        </div>

        <div id="registerForm" class="hidden">
          <div class="field">
            <label class="label" for="regName">نام نمایشی</label>
            <input class="input" id="regName" placeholder="کوروش">
          </div>
          <div class="field">
            <label class="label" for="regUser">شناسه</label>
            <input class="input" id="regUser" placeholder="wiriper_user">
          </div>
          <div class="field">
            <label class="label" for="regPass">رمز عبور</label>

  </section>

  <section id="appScreen" class="app-screen hidden" aria-label="Wiriper Prime">
    <div class="layout">

        </div>

        <div class="search-row">
          <input id="globalSearch" class="search" placeholder="جستجو در شبکه..." oninput="onSearchInput()">

        <div class="tabs-2">

          <button id="tabArchive" type="button" onclick="switchMainTab('archive')">آرشیو</button>

        <div id="sidebarLabel" class="section-label">گفتگوهای اخیر</div>

  <script>
    (() => {
      const LS = {

      const CONTACTS = [
        { uid:'nora', displayName:'Nora Vale', username:'nora', bio:'editorial designer · always online', avatarEmoji:'🌙', status:'online', reply:['I can feel the new frame.','That looks insanely elegant.','Perfect rhythm. Keep it like this.'] },

        { uid:'orion', displayName:'Orion Flux', username:'orion', bio:'midnight curator · luxury interface', avatarEmoji:'🚀', status:'online', reply:['The palette is perfect.','This messenger feels expensive.','The avatar fix is essential.'] }
      ];
      const BACKGROUNDS = [
        'linear-gradient(180deg, rgba(41,18,28,.72), rgba(7,6,10,.95))',
        'radial-gradient(circle at top, rgba(127,214,255,.12), transparent 32%), linear-gradient(180deg, rgba(11,7,12,.98), rgba(5,5,6,.98))',
        'radial-gradient(circle at 30% 20%, rgba(231,199,138,.12), transparent 30%), linear-gradient(180deg, rgba(28,13,23,.92), rgba(6,5,8,.98))'
      ];
      const DEFAULT_BACKGROUND = BACKGROUNDS[0];

      const $ = (id) => document.getElementById(id);
      const now = () => Date.now();
      const uid = () => (crypto && crypto.randomUUID ? crypto.randomUUID() : 'id_' + Math.random().toString(36).slice(2) + Date.now().toString(36));
      const esc = (s='') => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
      const twemojiUrl = (cluster) => {

          .map(ch => ch.codePointAt(0).toString(16))
          .filter(cp => cp !== 'fe0f');
        return `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${codepoints.join('-')}.svg`;
      };
      const segmenter = window.Intl && Intl.Segmenter ? new Intl.Segmenter('en', { granularity: 'grapheme' }) : null;
      const splitGraphemes = (text) => segmenter ? Array.from(segmenter.segment(text), x => x.segment) : Array.from(text);
      const hasEmoji = (cluster) => /[\p{Extended_Pictographic}\u{1f1e6}-\u{1f1ff}\u200d\uFE0F]/u.test(cluster);
      const renderEmojiText = (text='') => splitGraphemes(String(text)).map(gr => hasEmoji(gr) ? `<img class="emoji-img" alt="${esc(gr)}" src="${twemojiUrl(gr)}" loading="lazy">` : esc(gr)).join('');
      const imgMarkup = (emoji='💠', cls='emoji-icon') => `<img class="${cls}" alt="${esc(emoji)}" src="${twemojiUrl(emoji)}" loading="lazy">`;
      const emojiMarkup = (emoji='💠', cls='emoji-icon') => imgMarkup(emoji, cls);

      const state = {
        accounts: {},
        currentUid: null,
        chats: [],
        activeChatId: null,
        tab: 'chats',
        search: '',
        menuOpen: false,
        modal: '',
        emojiOpen: false,
        replyingTo: null
      };

      const persist = () => {
        localStorage.setItem(LS.accounts, JSON.stringify(state.accounts));
        localStorage.setItem(LS.state, JSON.stringify({
          [state.currentUid]: {
            chats: state.chats
          }
        }));
        localStorage.setItem(LS.session, JSON.stringify({ uid: state.currentUid }));
      };

      const loadJson = (key, fallback) => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch { return fallback; }
      };

      function seedAccounts(){
        const saved = loadJson(LS.accounts, null);
        if (saved && typeof saved === 'object') {
          state.accounts = saved;
          return;
        }
        const base = {};
        for (const c of CONTACTS) {
          base[c.uid] = {
            uid: c.uid,
            displayName: c.displayName,
            username: c.username,
            password: null,
            bio: c.bio,
            avatar: null,
            avatarEmoji: c.avatarEmoji,
            credits: 0,
            status: c.status,
            system: true,
            createdAt: now()
          };
        }
        state.accounts = base;
        localStorage.setItem(LS.accounts, JSON.stringify(base));
      }

      function defaultChatsFor(user){
        const t = now();
        return CONTACTS.slice(0,3).map((c, idx) => ({
          id: `chat_${user.uid}_${c.uid}`,
          contactId: c.uid,
          type: 'private',
          pinned: idx === 0,
          archived: false,
          background: BACKGROUNDS[idx % BACKGROUNDS.length],
          unread: idx === 0 ? 0 : 2,
          messages: [
            { id: uid(), senderId: c.uid, type: 'text', text: idx === 0 ? 'رسیدیم به یک طراحی خیلی تمیز ✨' : 'این نسخه حس گالری لوکس می‌دهد 💎', ts: t - 1000*60*60*(4-idx), reactions: { '💠':1 } },
            { id: uid(), senderId: user.uid, type: 'text', text: idx === 0 ? 'خیلی بهتر شد، مخصوصاً منو و آواتار.' : 'حالا ظاهرش واقعا premium شده.', ts: t - 1000*60*60*(3-idx) + 12000, reactions: {} }
          ]
        }));
      }

      function loadSession(){
        const sess = loadJson(LS.session, null);
        if (!sess || !sess.uid) return null;
        return sess.uid;
      }

      function getAccount(uidVal){ return state.accounts[uidVal] || null; }
      function contactFor(chat){
        return getAccount(chat.contactId) || CONTACTS.find(c => c.uid === chat.contactId) || null;
      }
      function me(){ return getAccount(state.currentUid); }

      function loadUserState(uidVal){
        const all = loadJson(LS.state, {});
        const entry = all[uidVal];
        if (entry && Array.isArray(entry.chats)) return entry.chats;
        const user = getAccount(uidVal);
        const chats = defaultChatsFor(user);
        all[uidVal] = { chats };
        localStorage.setItem(LS.state, JSON.stringify(all));
        return chats;
      }
      function saveUserState(){
        const all = loadJson(LS.state, {});
        all[state.currentUid] = { chats: state.chats };
        localStorage.setItem(LS.state, JSON.stringify(all));
        localStorage.setItem(LS.accounts, JSON.stringify(state.accounts));
      }

      function initDefaults(){
        seedAccounts();
        const demo = loadSession();
        if (demo && state.accounts[demo]) {
          state.currentUid = demo;
          state.chats = loadUserState(demo);
          return true;
        }
        return false;
      }

      function formatTime(ts){
        const d = new Date(ts);
        return new Intl.DateTimeFormat('fa-IR', { hour:'2-digit', minute:'2-digit' }).format(d);
      }
      function formatDate(ts){
        const d = new Date(ts);
        return new Intl.DateTimeFormat('fa-IR', { month:'short', day:'numeric' }).format(d);
      }
      function relative(ts){
        const diff = Math.max(0, now() - ts);
        const m = Math.floor(diff / 60000);
        if (m < 1) return 'الان';
        if (m < 60) return `${m}m`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h}h`;
        const d = Math.floor(h / 24);
        return `${d}d`;
      }
      function initials(name=''){
        return String(name).split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase() || 'W';
      }

      function toast(text){
        const t = $('toast');
        t.textContent = text;
        t.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => t.classList.remove('show'), 1800);
      }

      function showAuthMsg(text, ok=false){
        const el = $('authMsg');
        el.textContent = text;
        el.className = 'msg-line ' + (ok ? 'ok' : 'err');
      }

      function switchTab(tab){
        $('loginTab').classList.toggle('active', tab === 'login');
        $('registerTab').classList.toggle('active', tab === 'register');
        $('loginForm').classList.toggle('hidden', tab !== 'login');
        $('registerForm').classList.toggle('hidden', tab !== 'register');
        showAuthMsg('');
      }

      function makeUserFromForm(){
        const displayName = $('regName').value.trim();
        const username = $('regUser').value.trim().toLowerCase();
        const password = $('regPass').value;
        return { displayName, username, password };
      }

      function doRegister(){
        const { displayName, username, password } = makeUserFromForm();
        if (!displayName || !username || username.length < 3) return showAuthMsg('نام و شناسه معتبر وارد کن.');
        if (!password || password.length < 6) return showAuthMsg('رمز عبور باید حداقل ۶ کاراکتر باشد.');
        const exists = Object.values(state.accounts).some(a => a.username === username);
        if (exists) return showAuthMsg('این شناسه قبلا ثبت شده است.');
        const newUser = {
          uid: uid(),
          displayName,
          username,
          password,
          bio: 'warm private space · wiriper prime',
          avatar: null,
          avatarEmoji: '💠',
          credits: 80,
          status: 'online',
          system: false,
          createdAt: now()
        };
        state.accounts[newUser.uid] = newUser;
        state.currentUid = newUser.uid;
        state.chats = defaultChatsFor(newUser);
        persist();
        showAuthMsg('ثبت شد. در حال ورود...', true);
        enterApp();
      }

      function doLogin(){
        const username = $('loginUser').value.trim().toLowerCase();
        const password = $('loginPass').value;
        const user = Object.values(state.accounts).find(a => a.username === username && a.password === password);
        if (!user) return showAuthMsg('شناسه یا رمز عبور اشتباه است.');
        state.currentUid = user.uid;
        state.chats = loadUserState(user.uid);
        persist();
        showAuthMsg('اتصال برقرار شد.', true);
        enterApp();
      }

        toast('شبکه محلی آماده است');
      }

        $('authScreen').classList.add('hidden');

      function avatarHTML(user, small=false){
        const emoji = user?.avatarEmoji || '💠';
        const image = user?.avatar || '';
        const name = user?.displayName || 'Wiriper';
        const initialsText = initials(name);
        return `
          <div class="avatar-wrap ${small ? 'small' : ''} ${image ? 'has-image' : ''}">
            <img class="avatar-img" alt="${esc(name)}" src="${image || ''}">
            <span class="avatar-fallback">${image ? '' : emojiMarkup(emoji)}${image ? '' : `<span class="initial">${esc(initialsText)}</span>`}</span>
          </div>
        `;
      }

      function applyAvatarToAll(){
        const user = me();
        if (!user) return;
        $('meAvatarBtn').classList.toggle('has-image', !!user.avatar);
        $('meAvatarImg').src = user.avatar || '';
        $('meAvatarImg').onerror = () => { $('meAvatarBtn').classList.remove('has-image'); };
        $('meAvatarBtn').classList.toggle('has-image', !!user.avatar);
        $('meAvatarFallback').innerHTML = user.avatar ? '' : (emojiMarkup(user.avatarEmoji || '💠') + `<span class="initial">${esc(initials(user.displayName))}</span>`);

        $('meId').textContent = '@' + user.username;

        const buttons = [$('chatAvatarBtn')];
        buttons.forEach(btn => {
          if (!btn) return;
        });
      }

      function currentChat(){
        return state.chats.find(c => c.id === state.activeChatId) || null;
      }

      function chatListData(){
        const q = state.search.trim().toLowerCase();
        let items = [...state.chats];
        if (state.tab === 'archive') items = items.filter(c => c.archived);
        else if (state.tab === 'chats') items = items.filter(c => !c.archived);
        if (q) {
          items = items.filter(c => {
            const contact = contactFor(c);
            const last = c.messages.at(-1)?.text || '';
            return [contact?.displayName, contact?.username, last].join(' ').toLowerCase().includes(q);
          });
        }
        items.sort((a,b) => (b.messages.at(-1)?.ts || 0) - (a.messages.at(-1)?.ts || 0));
        return items;
      }

      function renderSidebar(){
        const list = $('sidebarList');

            list.appendChild(node);

          return;
        }
        label.textContent = state.tab === 'archive' ? 'آرشیو' : 'گفتگوهای اخیر';
        const items = chatListData();
        if (!items.length) {
          list.innerHTML = `<div class="discover-card"><div class="discover-title">چیزی پیدا نشد</div><div class="discover-sub">جستجو را تغییر بده یا از بخش اکتشاف یک گفتگو شروع کن.</div></div>`;
          return;
        }
        for (const chat of items) {

          row.className = 'item' + (active ? ' active' : '');

          row.innerHTML = `
            ${avatarHTML(contact, true)}
            <div class="item-meta">
              <div class="item-head">
                <div class="item-name">${esc(contact?.displayName || chat.contactId)} ${contact?.status === 'online' ? '<span class="status-dot"></span>' : ''}</div>
                <span class="item-time">${last ? relative(last.ts) : ''}</span>
              </div>
              <div class="item-last">${esc(last ? last.text : 'بدون پیام')}</div>
            </div>
            ${unread ? `<span class="badge">${unread}</span>` : ''}
          `;
          row.onclick = () => openChat(chat.id);
          list.appendChild(row);
        }
      }

      function renderChatHeader(){
        const chat = currentChat();
        if (!chat) {
          $('chatTitle').textContent = 'Wiriper Prime';
          $('chatSub').textContent = 'شبکه آماده اتصال';
          $('chatAvatarBtn').classList.remove('has-image');
          $('chatAvatarImg').src = '';
          $('chatAvatarFallback').innerHTML = emojiMarkup('💠') + `<span class="initial">WP</span>`;
          return;
        }
        const contact = contactFor(chat);
        $('chatTitle').textContent = contact?.displayName || 'Private Chat';
        $('chatSub').textContent = contact?.status === 'online' ? 'online · now' : `last seen ${relative((contact?.lastSeen || now()) - 0)}`;
        if (chat.pinned && chat.pinnedText) {
          $('pinnedBar').style.display = 'block';
          $('pinnedTxt').textContent = chat.pinnedText;
        } else {
          $('pinnedBar').style.display = 'none';
        }
        $('chatAvatarBtn').classList.toggle('has-image', !!contact?.avatar);
        $('chatAvatarImg').src = contact?.avatar || '';
        $('chatAvatarImg').onerror = () => $('chatAvatarBtn').classList.remove('has-image');
        $('chatAvatarFallback').innerHTML = contact?.avatar ? '' : (emojiMarkup(contact?.avatarEmoji || '💠') + `<span class="initial">${esc(initials(contact?.displayName || 'WP'))}</span>`);

      function reactionHTML(reactions = {}){

          <button class="react${count > 0 ? ' active' : ''}" type="button" onclick="addReaction('${emoji}')">
            ${emojiMarkup(emoji, 'emoji-in-btn')} <span>${count}</span>
          </button>
        `).join('');

      function renderMessage(msg, chat){
        const user = me();
        const fromMe = msg.senderId === user.uid;
        const sender = fromMe ? user : contactFor(chat);
        const row = document.createElement('div');
        row.className = 'bubble-row' + (fromMe ? ' me' : '');
        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + (fromMe ? 'me' : '');
        bubble.tabIndex = 0;
        bubble.dataset.msgid = msg.id;
        bubble.innerHTML = `
          <div class="msg-tools">
            <button class="tool" type="button" title="ری‌اکشن" onclick="openReactionPicker('${msg.id}', event)">✦</button>
            <button class="tool" type="button" title="کپی" onclick="copyMessage('${msg.id}', event)">⇱</button>
            <button class="tool" type="button" title="پین" onclick="pinMessage('${msg.id}', event)">⌖</button>
          </div>
          ${!fromMe ? `<div class="sender">${esc(sender?.displayName || 'Wiriper')}</div>` : ''}
          <div class="msg-text">${renderEmojiText(msg.text || '')}</div>
          ${msg.type === 'image' && msg.attachment ? `<a class="attachment" href="${msg.attachment}" target="_blank" onclick="event.stopPropagation();openLightbox('${msg.attachment}')"><img src="${msg.attachment}" alt="attachment"></a>` : ''}
          ${msg.type === 'file' && msg.attachment ? `<a class="attachment file-card" href="${msg.attachment}" target="_blank" download>
              <div class="file-ico">↧</div>
              <div class="file-name">${esc(msg.fileName || 'file')}</div>
          </a>` : ''}
          ${msg.reactions && Object.keys(msg.reactions).length ? `<div class="reactions">${reactionHTML(msg.reactions)}</div>` : ''}
          <div class="meta"><span>${formatTime(msg.ts)}</span>${fromMe ? `<span class="tick ${msg.read ? 'read' : ''}">${msg.read ? '✓✓' : '✓'}</span>` : ''}</div>
        `;
        row.appendChild(bubble);
        row.onclick = () => { state.replyingTo = msg; };
        return row;
      }

      function renderMessages(){
        const chat = currentChat();
        const wrap = $('messagesWrap');
        wrap.innerHTML = '';
        if (!chat) {
          $('emptyState').classList.remove('hidden');
          return;
        }
        $('emptyState').classList.add('hidden');
        renderChatHeader();
        const msgs = chat.messages.slice().sort((a,b)=>a.ts-b.ts);

        state.activeChatId = chatId;
        const chat = currentChat();

        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();

      function sendMessage(){
        const chat = currentChat();
        const text = getComposerText();
        if (!chat || !text) return;
        const user = me();
        const msg = {
          id: uid(),
          senderId: user.uid,

      function maybeAutoReply(chat){

        if (!shouldReply) return;
        showTyping(contact.displayName);

            id: uid(),
            senderId: contact.uid,
            type:'text',

            read:true,

      async function fileToDataURL(file){
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function resizeAvatar(file){
        const max = 512;
        const img = await new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const i = new Image();
          i.onload = () => { URL.revokeObjectURL(url); resolve(i); };
          i.onerror = reject;
          i.src = url;
        });
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.9);
      }

      async function handleAttachFile(file){
        if (!file || !currentChat()) return;
        const chat = currentChat();
        const user = me();
        const isImage = file.type.startsWith('image/');
        let attachment = await fileToDataURL(file);
        if (isImage) {
          try { attachment = await resizeAvatar(file); } catch {}
        }
        chat.messages.push({
          id: uid(),
          senderId: user.uid,
          type: isImage ? 'image' : 'file',
          text: isImage ? 'تصویر جدید' : file.name,
          attachment,
          fileName: file.name,
          ts: now(),
          read: true,
          reactions: {}
        });
        saveUserState();
        renderAll(true);
      }

      function closeMenu(){
        $('menuBackdrop').classList.remove('show');
        $('menuPanel').classList.remove('show');
        state.menuOpen = false;
      }

      function backdropClick(e){
        if (e.target === $('modalBackdrop')) closeModal();
      }

      function openModal(html){
        $('modalContent').innerHTML = html;
        $('modalBackdrop').classList.add('show');
        state.modal = 'open';
      }
      function closeModal(){
        $('modalBackdrop').classList.remove('show');
        $('modalContent').innerHTML = '';
        state.modal = '';
      }

      function openMyProfile(){
        const u = me();
        openModal(`
          <h2>پروفایل من <button class="close-x" type="button" onclick="closeModal()">×</button></h2>
          <div class="profile-head">
            <div class="avatar-wrap large ${u.avatar ? 'has-image' : ''}" id="profileAvatarBox">
              <img class="avatar-img" id="profileAvatarImg" alt="">
              <span class="avatar-fallback" id="profileAvatarFallback">${u.avatar ? '' : emojiMarkup(u.avatarEmoji || '💠') + `<span class="initial">${esc(initials(u.displayName))}</span>`}</span>
            </div>
            <div class="profile-name">${esc(u.displayName)}</div>
            <div class="profile-id">@${esc(u.username)}</div>
            <div class="profile-bio" id="profileBioPreview">${esc(u.bio || '')}</div>
          </div>
          <div class="upload">
            <div>
              <div class="discover-title">آپلود تصویر پروفایل</div>
              <div class="helper">فایل فوری نمایش داده می‌شود و پس از تازه‌سازی هم باقی می‌ماند.</div>
            </div>
            <label class="upload-label" for="avatarUpload">انتخاب</label>
            <input id="avatarUpload" type="file" accept="image/*">
          </div>
          <div class="field" style="margin-top:12px">
            <label class="label" for="profileNameInput">نام نمایشی</label>
            <input id="profileNameInput" class="input" value="${esc(u.displayName)}">
          </div>
          <div class="field">
            <label class="label" for="profileBioInput">بیو</label>
            <textarea id="profileBioInput" class="textarea">${esc(u.bio || '')}</textarea>
          </div>
          <div class="modal-actions">
            <button class="primary-btn" type="button" onclick="saveProfile()">ذخیره تغییرات</button>
            <button class="pill" type="button" onclick="openCreditModal();closeModal()">کیف پول</button>
          </div>
        `);
        const input = $('avatarUpload');
        input.onchange = async () => {
          const file = input.files && input.files[0];
          if (!file) return;
          try {
            const data = await resizeAvatar(file);
            const user = me();
            user.avatar = data;
            user.avatarEmoji = user.avatarEmoji || '💠';
            state.accounts[user.uid] = user;
            applyAvatarToAll();
            const img = $('profileAvatarImg');
            img.src = data;
            $('profileAvatarBox').classList.add('has-image');
            $('profileAvatarFallback').innerHTML = '';
            saveUserState();
            toast('آواتار بروزرسانی شد');
          } catch {
            toast('آپلود ناموفق بود');
          }
        };
        const img = $('profileAvatarImg');
        img.src = u.avatar || '';
        img.onerror = () => $('profileAvatarBox').classList.remove('has-image');
        if (u.avatar) $('profileAvatarBox').classList.add('has-image');
      }

      function saveProfile(){
        const user = me();
        user.displayName = $('profileNameInput').value.trim() || user.displayName;
        user.bio = $('profileBioInput').value.trim();
        state.accounts[user.uid] = user;
        applyAvatarToAll();
        saveUserState();
        renderAll();
        toast('پروفایل ذخیره شد');
        closeModal();
      }

      function openCreditModal(){
        const user = me();
        openModal(`
          <h2>کیف پول دیجیتال <button class="close-x" type="button" onclick="closeModal()">×</button></h2>
          <div class="credit-box">
            <div>
              <div class="cap">available credits</div>
              <div class="num">${user.credits || 0}</div>
            </div>
            <div>${emojiMarkup('💎','emoji-in-btn')}</div>
          </div>
          <div class="discover-sub">این بخش برای نمایش حس محصول آماده شده است. می‌توانی برای تست لوکس‌بودن UI، موجودی را موقتاً افزایش بدهی.</div>
          <div class="modal-actions">
            <button class="pill primary" type="button" onclick="bumpCredits(25)">+25</button>
            <button class="pill primary" type="button" onclick="bumpCredits(100)">+100</button>
            <button class="pill" type="button" onclick="bumpCredits(250)">+250</button>
          </div>
        `);
      }

      function bumpCredits(value){
        const user = me();
        user.credits = (user.credits || 0) + value;
        state.accounts[user.uid] = user;
        state.currentUid = user.uid;
        saveUserState();
        toast(`+${value} credits`);
        openCreditModal();
      }

      function openPremiumModal(){
        openModal(`
          <h2>پنل گلد <button class="close-x" type="button" onclick="closeModal()">×</button></h2>
          <div class="discover-card">
            <div class="discover-title">Wiriper Prime Gold</div>
            <div class="discover-sub">نسخه‌ی نمایشی یک تجربه‌ی لوکس‌تر: شفافیت عمیق‌تر، لبه‌های نرم‌تر، و حضور بصری پرکنتراست.</div>
          </div>
          <div class="swatches">
            <div class="swatch active" style="background:linear-gradient(180deg, rgba(46,17,28,.95), rgba(10,7,10,.96))"><span>Oxblood</span></div>
            <div class="swatch" style="background:linear-gradient(180deg, rgba(20,18,28,.95), rgba(7,8,10,.98))"><span>Night Glass</span></div>
            <div class="swatch" style="background:linear-gradient(180deg, rgba(41,27,10,.95), rgba(12,8,10,.98))"><span>Gold Frame</span></div>
          </div>
          <div class="footer-note">قفل‌های بصری، حاشیه‌های ظریف، و glow کنترل‌شده باعث می‌شوند پنل شبیه یک محصول واقعی سطح بالا دیده شود.</div>
        `);
      }

      function doLogout(){
        localStorage.removeItem(LS.session);
        state.currentUid = null;
        state.activeChatId = null;
        closeMenu();
        closeModal();
        $('appScreen').classList.add('hidden');
        $('authScreen').classList.remove('hidden');
        $('authMsg').textContent = '';
        toast('خروج انجام شد');
      }

      function openLightbox(src){
        let box = $('lightbox');
        if (!box) {
          box = document.createElement('div');
          box.id = 'lightbox';
          box.innerHTML = `<button class="lb-close" type="button" onclick="closeLightbox()">×</button><img id="lbImg" alt="">`;
          document.body.appendChild(box);
        }
        $('lbImg').src = src;
        box.classList.add('show');
      }
      function closeLightbox(){
        const box = $('lightbox');
        if (box) box.classList.remove('show');
      }

      function copyMessage(id, ev){
        ev?.stopPropagation();
        const chat = currentChat();
        const msg = chat?.messages.find(m => m.id === id);
        if (!msg) return;
        navigator.clipboard?.writeText(msg.text || '').then(() => toast('کپی شد')).catch(() => toast('کپی نشد'));
      }

      function pinMessage(id, ev){
        ev?.stopPropagation();
        const chat = currentChat();
        const msg = chat?.messages.find(m => m.id === id);
        if (!msg || !chat) return;
        chat.pinned = true;
        chat.pinnedText = msg.text || '';
        saveUserState();
        renderAll();
        toast('پیام پین شد');
      }

      function addReaction(emoji){
        const chat = currentChat();
        if (!chat) return;
        const last = chat.messages.at(-1);
        if (!last) return;
        last.reactions ||= {};
        last.reactions[emoji] = (last.reactions[emoji] || 0) + 1;
        saveUserState();
        renderMessages();
      }

      function openReactionPicker(id, ev){
        ev?.stopPropagation();
        const chat = currentChat();
        const msg = chat?.messages.find(m => m.id === id);
        if (!msg) return;
        const box = document.createElement('div');
        box.className = 'emoji-picker show';
        box.style.position = 'fixed';
        box.style.zIndex = 260;
        box.style.insetInlineEnd = '16px';
        box.style.bottom = '90px';
        box.innerHTML = `<div class="emoji-grid">${EMOJI_SET.slice(0,16).map(e => `<button class="emoji-btn" type="button" onclick="reactToMessage('${id}','${e}')">${emojiMarkup(e,'emoji-in-btn')}</button>`).join('')}</div>`;
        document.body.appendChild(box);
        const close = () => { box.remove(); document.removeEventListener('click', close); };
        setTimeout(() => document.addEventListener('click', close, { once:true }), 0);
      }

      function reactToMessage(id, emoji){
        const chat = currentChat();
        const msg = chat?.messages.find(m => m.id === id);
        if (!msg) return;
        msg.reactions ||= {};
        msg.reactions[emoji] = (msg.reactions[emoji] || 0) + 1;
        saveUserState();
        renderMessages();
      }

      function insertEmoji(emoji){
        const input = $('msgInput');
        const start = input.selectionStart || 0;
        const end = input.selectionEnd || 0;
        const val = input.value;
        input.value = val.slice(0, start) + emoji + val.slice(end);
        input.focus();
        input.selectionStart = input.selectionEnd = start + emoji.length;
        autoGrow(input);
      }

      function toggleEmojiPicker(ev){
        ev?.stopPropagation();
        const picker = $('emojiPicker');
        const show = !picker.classList.contains('show');
        picker.classList.toggle('show', show);
        state.emojiOpen = show;
        if (show) closeMenu();
      }
      function closeEmojiPicker(){
        $('emojiPicker').classList.remove('show');
        state.emojiOpen = false;
      }

      function openCurrentContact(){
        const chat = currentChat();
        if (!chat) return;
        openMyProfile();
      }

      function updateAvatarFallbacks(){
        const user = me();
        if (!user) return;
        $('splashMark').innerHTML = emojiMarkup('💠', 'brand-emoji');
        $('authMark').innerHTML = emojiMarkup('💠', 'brand-emoji');
        $('emptyMark').innerHTML = emojiMarkup('💠', 'brand-emoji');
        $('meAvatarFallback').innerHTML = user.avatar ? '' : (emojiMarkup(user.avatarEmoji || '💠') + `<span class="initial">${esc(initials(user.displayName))}</span>`);
        $('meAvatarBtn').classList.toggle('has-image', !!user.avatar);
        $('meAvatarImg').src = user.avatar || '';
        $('meAvatarImg').onerror = () => $('meAvatarBtn').classList.remove('has-image');
      }

      function renderAll(scroll=true){
        applyAvatarToAll();
        updateAvatarFallbacks();
        renderSidebar();
        renderChatHeader();
        renderMessages();
        renderEmojiPicker();
        if (scroll) requestAnimationFrame(() => { $('messagesWrap').scrollTop = $('messagesWrap').scrollHeight; });
      }

      function maybeOpenLastChat(){
        const chat = state.chats.find(c => !c.archived);
        if (chat) state.activeChatId = chat.id;
      }

      function start(){
        initDefaults();
        if (state.currentUid) {
          $('authScreen').classList.add('hidden');
          $('appScreen').classList.remove('hidden');
          maybeOpenLastChat();
          renderAll(false);
          setTimeout(() => $('splash').classList.add('hide'), 900);
        } else {
          $('appScreen').classList.add('hidden');
          $('authScreen').classList.remove('hidden');
          setTimeout(() => $('splash').classList.add('hide'), 900);
        }
      }

      window.switchTab = switchTab;
      window.doLogin = doLogin;
      window.doRegister = doRegister;
      window.retryConnection = retryConnection;
      window.toggleMenu = toggleMenu;
      window.closeMenu = closeMenu;
      window.openMyProfile = openMyProfile;
      window.openPremiumModal = openPremiumModal;
      window.openCreditModal = openCreditModal;
      window.doLogout = doLogout;
      window.onSearchInput = onSearchInput;
      window.switchMainTab = switchMainTab;
      window.openChat = openChat;
      window.openOrCreateChat = openOrCreateChat;
      window.closeChat = closeChat;
      window.sendMessage = sendMessage;
      window.addReaction = addReaction;
      window.openReactionPicker = openReactionPicker;
      window.reactToMessage = reactToMessage;
      window.copyMessage = copyMessage;
      window.pinMessage = pinMessage;
      window.insertEmoji = insertEmoji;
      window.toggleEmojiPicker = toggleEmojiPicker;
      window.closeEmojiPicker = closeEmojiPicker;
      window.triggerAttach = triggerAttach;
      window.backdropClick = backdropClick;
      window.closeModal = closeModal;
      window.openLightbox = openLightbox;
      window.closeLightbox = closeLightbox;
      window.saveProfile = saveProfile;
      window.bumpCredits = bumpCredits;
      window.openCurrentContact = openCurrentContact;
      window.autoGrow = autoGrow;
      window.composerKeydown = composerKeydown;

      $('attachInput').addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) await handleAttachFile(file);
        e.target.value = '';
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeMenu();
          closeEmojiPicker();
          closeModal();
          closeLightbox();
        }
      });

      document.addEventListener('click', (e) => {
        const menu = $('menuPanel');
        const back = $('menuBackdrop');
        if (state.menuOpen && !menu.contains(e.target) && e.target !== $('menuToggle')) closeMenu();
        const picker = $('emojiPicker');
        if (state.emojiOpen && picker && !picker.contains(e.target) && !e.target.closest('.icon-btn')) closeEmojiPicker();
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth > 760) $('chatPanel').classList.remove('open');
      });

      window.addEventListener('beforeunload', () => {
        if (state.currentUid) saveUserState();
      });

      // Twemoji SVG images are used to keep emoji rendering visually consistent across platforms.
      start();
    })();
  </script>
</body>
</html>
