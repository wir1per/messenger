<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="theme-color" content="#09090d" />
    <meta name="description" content="Wiriper Prime - پیام‌رسان سلطنتی" />
    <title>Wiriper Prime | پیام‌رسان سلطنتی</title>

    <style>
        :root {
            --bg: #08080d;
            --bg2: #11111a;
            --panel: #151520;
            --panel2: #1d1d2b;
            --text: #f8f1dc;
            --muted: #aaa28e;
            --gold: #d8a83f;
            --gold2: #ffe08a;
            --danger: #ff4d67;
            --ok: #37d67a;
            --border: rgba(216, 168, 63, .22);
            --shadow: 0 18px 50px rgba(0, 0, 0, .45);
            --r: 18px;
            --r2: 28px;
            --tr: .22s ease;
            --font: Tahoma, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            height: 100%;
            margin: 0
        }

        body {
            font-family: var(--font);
            background: radial-gradient(circle at top, #2b2111 0, #08080d 38%, #050508 100%);
            color: var(--text);
            overflow: hidden;
        }

        button,
        input,
        textarea {
            font: inherit;
            color: inherit;
            border: none;
            outline: none;
        }

        button {
            cursor: pointer;
            user-select: none;
        }

        .hide {
            display: none !important;
        }
        .show {
            display: flex !important;
        }
        .active {
            background: linear-gradient(135deg, var(--gold), var(--gold2)) !important;
            color: #141006 !important;
        }
        .premium {
            color: var(--gold2);
        }
        .muted {
            color: var(--muted);
        }
        .danger {
            color: var(--danger);
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
        }

        #splashScreen {
            z-index: 50;
            background: radial-gradient(circle at center, rgba(216, 168, 63, .2), transparent 34%),
                linear-gradient(145deg, #050508, #14131e);
            transition: opacity .5s ease, visibility .5s ease;
        }

        #splashScreen.hideSplash {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .splash-card {
            text-align: center;
            animation: pulse 1.8s infinite alternate;
        }

        .logo {
            width: 96px;
            height: 96px;
            margin: auto;
            border-radius: 32px;
            display: grid;
            place-items: center;
            font-size: 44px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #161006;
            box-shadow: 0 0 45px rgba(216, 168, 63, .45);
        }

        .brand {
            margin-top: 18px;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: .4px;
        }

        .subtitle {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        @keyframes pulse {
            from {
                transform: scale(.97);
                filter: brightness(.9)
            }
            to {
                transform: scale(1.03);
                filter: brightness(1.15)
            }
        }

        #authScreen {
            z-index: 10;
            background: radial-gradient(circle at top right, rgba(216, 168, 63, .2), transparent 35%),
                var(--bg);
        }

        .auth-card {
            width: min(430px, 100%);
            background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .025));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: var(--r2);
            padding: 24px;
            backdrop-filter: blur(16px);
        }

        .auth-head {
            text-align: center;
            margin-bottom: 20px
        }
        .auth-head .logo {
            width: 74px;
            height: 74px;
            border-radius: 24px;
            font-size: 34px
        }
        .auth-head h1 {
            margin: 14px 0 4px;
            font-size: 23px
        }
        .auth-head p {
            margin: 0;
            color: var(--muted);
            font-size: 13px
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: rgba(255, 255, 255, .05);
            border-radius: 16px;
            padding: 6px;
            margin-bottom: 16px;
        }

        .tabs button {
            padding: 11px;
            border-radius: 12px;
            background: transparent;
            color: var(--muted);
            transition: var(--tr);
        }

        .form {
            display: none;
            flex-direction: column;
            gap: 12px
        }
        .form.show {
            display: flex !important;
        }

        .field {
            background: rgba(0, 0, 0, .26);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 15px;
            padding: 13px 14px;
            transition: var(--tr);
        }

        .field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(216, 168, 63, .13);
        }

        .btn {
            min-height: 46px;
            padding: 0 18px;
            border-radius: 15px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #151006;
            transition: transform var(--tr), filter var(--tr);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            filter: brightness(1.05)
        }
        .btn:active {
            transform: scale(.98)
        }
        .btn.ghost {
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, .09);
        }
        .btn.danger {
            background: rgba(255, 77, 103, .15);
            color: #ffd4dc;
            border: 1px solid rgba(255, 77, 103, .25);
        }

        #authMsg {
            min-height: 18px;
            font-size: 13px;
            text-align: center;
            color: var(--muted);
        }
        #authMsg.ok {
            color: var(--ok)
        }
        #authMsg.err {
            color: var(--danger)
        }

        #app {
            height: 100%;
            display: none;
            grid-template-rows: auto 1fr auto;
            background: var(--bg);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px;
            background: rgba(15, 15, 24, .86);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(18px);
            position: relative;
            z-index: 5;
        }

        .me {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        #meAvatar,
        .av {
            width: 46px;
            height: 46px;
            flex: 0 0 auto;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #4a3512, var(--gold));
            color: #171006;
            font-weight: 900;
            border: 1px solid rgba(255, 255, 255, .12);
        }

        .me-info {
            min-width: 0
        }
        #meName {
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 210px;
        }
        #meId {
            font-size: 12px;
            color: var(--muted);
            direction: ltr;
            text-align: right
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 15px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .08);
            display: grid;
            place-items: center;
            transition: var(--tr);
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, .1)
        }

        .main {
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 10px 14px;
            background: rgba(10, 10, 16, .94);
            border-bottom: 1px solid rgba(255, 255, 255, .06);
        }

        .nav button {
            border-radius: 14px;
            padding: 11px 8px;
            background: rgba(255, 255, 255, .05);
            color: var(--muted);
            font-weight: 800;
        }

        .list-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px 8px;
            gap: 10px;
        }

        #listTitle {
            font-weight: 900
        }
        #globalSearch {
            width: 48%;
            min-width: 150px;
            padding: 10px 13px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .08);
            font-size: 13px;
        }

        #mainList {
            overflow: auto;
            padding: 6px 14px 96px;
            scroll-behavior: smooth;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .025));
            border: 1px solid rgba(255, 255, 255, .075);
            transition: var(--tr);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .chat-item:hover {
            transform: translateY(-1px);
            border-color: var(--border);
        }

        .ci-main {
            min-width: 0;
            flex: 1
        }
        .ci-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }
        .ci-name {
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ci-last {
            margin-top: 5px;
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ci-time {
            color: var(--muted);
            font-size: 11px;
            flex: 0 0 auto;
        }

        .tag {
            font-size: 10px;
            color: #160f04;
            background: var(--gold2);
            border-radius: 99px;
            padding: 3px 7px;
            font-weight: 900;
        }

        .online-dot {
            position: absolute;
            right: 45px;
            bottom: 13px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--ok);
            border: 2px solid var(--panel);
        }

        .unread-badge {
            min-width: 20px;
            height: 20px;
            display: grid;
            place-items: center;
            padding: 0 6px;
            border-radius: 99px;
            background: var(--danger);
            color: white;
            font-size: 11px;
            font-weight: 900;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 40px 10px;
            line-height: 2;
        }

        .chat-view {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100%;
            margin: -6px -14px -96px;
        }

        .chat-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            background: rgba(15, 15, 24, .95);
            position: sticky;
            top: 0;
            z-index: 3;
        }

        .messages {
            overflow: auto;
            padding: 14px;
        }

        .msg {
            max-width: 82%;
            margin: 7px 0;
            padding: 10px 12px;
            border-radius: 17px;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .06);
            line-height: 1.7;
            word-break: break-word;
        }

        .msg.me {
            margin-right: auto;
            background: linear-gradient(135deg, rgba(216, 168, 63, .25), rgba(255, 224, 138, .16));
            border-color: rgba(216, 168, 63, .25);
        }

        .msg img {
            max-width: 100%;
            border-radius: 12px;
            display: block;
            cursor: pointer;
            transition: var(--tr);
        }
        .msg img:hover {
            filter: brightness(1.08);
        }

        .msg-time {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 10px;
            text-align: left;
        }

        .composer {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid rgba(255, 255, 255, .08);
            background: rgba(10, 10, 16, .98);
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            resize: none;
            min-height: 44px;
            max-height: 110px;
            padding: 11px 13px;
            border-radius: 16px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .08);
        }

        .img-upload-btn {
            width: 44px;
            height: 44px;
            border-radius: 15px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .08);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: var(--tr);
            font-size: 20px;
            flex-shrink: 0;
        }
        .img-upload-btn:hover {
            background: rgba(255, 255, 255, .12);
        }
        .img-upload-btn.uploading {
            animation: spin 0.8s linear infinite;
            pointer-events: none;
            opacity: 0.6;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .menu {
            position: fixed;
            top: 70px;
            left: 14px;
            width: min(270px, calc(100% - 28px));
            background: rgba(20, 20, 31, .98);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 10px;
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(18px);
        }

        .menu button {
            text-align: right;
            background: rgba(255, 255, 255, .05);
            border-radius: 14px;
            padding: 12px;
        }

        #chatMenu {
            top: 70px;
            right: 14px;
            left: auto
        }

        #toast {
            position: fixed;
            right: 50%;
            bottom: 24px;
            transform: translateX(50%) translateY(20px);
            min-width: 220px;
            max-width: calc(100% - 32px);
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(24, 24, 35, .97);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            opacity: 0;
            pointer-events: none;
            z-index: 80;
            transition: var(--tr);
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(50%) translateY(0);
        }

        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 70;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .78);
            padding: 22px;
        }

        .modal {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 18px;
            box-shadow: var(--shadow);
        }

        #offlineOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 90;
            padding: 22px;
            background: rgba(0, 0, 0, .82);
        }

        .ripple-effect {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, .35);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple .55s ease-out forwards;
        }

        @keyframes ripple {
            to {
                transform: translate(-50%, -50%) scale(18);
                opacity: 0
            }
        }

        @media(min-width:760px) {
            body {
                display: grid;
                place-items: center
            }
            #app {
                width: 430px;
                height: min(860px, 100vh);
                border-radius: 28px;
                overflow: hidden;
                border: 1px solid var(--border);
                box-shadow: var(--shadow);
            }
            .screen {
                position: fixed
            }
        }
    </style>
</head>

<body>
    <div id="splashScreen" class="screen">
        <div class="splash-card">
            <div class="logo">♛</div>
            <div class="brand">Wiriper Prime</div>
            <div class="subtitle">پیام‌رسان سلطنتی</div>
        </div>
    </div>

    <section id="authScreen" class="screen">
        <div class="auth-card">
            <div class="auth-head">
                <div class="logo">♛</div>
                <h1>Wiriper Prime</h1>
                <p>ورود به پیام‌رسان سلطنتی</p>
            </div>

            <div class="tabs">
                <button id="tabLogin" class="active" onclick="switchTab('login')">ورود</button>
                <button id="tabReg" onclick="switchTab('reg')">ثبت‌نام</button>
            </div>

            <form id="loginForm" class="form show" onsubmit="event.preventDefault();doLogin()">
                <input id="lUser" class="field" placeholder="نام کاربری یا ایمیل" autocomplete="username" />
                <input id="lPass" class="field" type="password" placeholder="رمز عبور" autocomplete="current-password" />
                <button class="btn" type="submit">ورود</button>
            </form>

            <form id="regForm" class="form" onsubmit="event.preventDefault();doRegister()">
                <input id="rName" class="field" placeholder="نام نمایشی" autocomplete="name" />
                <input id="rUser" class="field" placeholder="نام کاربری" autocomplete="username" />
                <input id="rPass" class="field" type="password" placeholder="رمز عبور" autocomplete="new-password" />
                <button class="btn" type="submit">ساخت حساب</button>
            </form>

            <div id="authMsg"></div>
        </div>
    </section>

    <main id="app">
        <header class="topbar">
            <div class="me">
                <div id="meAvatar">?</div>
                <div class="me-info">
                    <div id="meName">...</div>
                    <div id="meId">@...</div>
                </div>
            </div>
            <div style="display:flex;gap:8px">
                <button id="btnRoyalDecree" class="icon-btn" title="Royal" onclick="toggleRoyalAudio()">♛</button>
                <button class="icon-btn" onclick="toggleMenu(event)">☰</button>
            </div>
        </header>

        <section class="main">
            <nav class="nav">
                <button id="tabChats" class="active" onclick="switchMainTab('chats')">چت‌ها</button>
                <button id="tabDiscover" onclick="switchMainTab('discover')">دیسکاور</button>
                <button id="tabLeaders" onclick="switchMainTab('leaders')">برترین‌ها</button>
            </nav>

            <div>
                <div class="list-head">
                    <strong id="listTitle">چت‌های من</strong>
                    <input id="globalSearch" placeholder="جستجو..." oninput="filterCurrentList()" />
                </div>
                <div id="mainList"></div>
            </div>
        </section>
    </main>

    <div id="mainMenu" class="menu">
        <button onclick="showMockModal('پروفایل در نسخه بعدی فعال می‌شود')">👤 پروفایل</button>
        <button onclick="showMockModal('تنظیمات در نسخه بعدی فعال می‌شود')">⚙️ تنظیمات</button>
        <button onclick="loadDiscover()">🌐 بروزرسانی دیسکاور</button>
        <button class="danger" onclick="doLogout()">خروج</button>
    </div>

    <div id="chatMenu" class="menu">
        <button onclick="showMockModal('اطلاعات چت')">ℹ️ اطلاعات چت</button>
        <button onclick="closeActiveChat()">↩ بازگشت</button>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">پیام</h3>
            <p id="mockText" class="muted"></p>
            <button class="btn" onclick="closeLightbox()">باشه</button>
        </div>
    </div>

    <div id="toast"></div>

    <div id="offlineOverlay">
        <div class="modal" style="text-align:center">
            <h3>اتصال قطع شد</h3>
            <p class="muted">لطفاً اینترنت خود را بررسی کنید.</p>
            <button class="btn" onclick="retryConnection()">تلاش دوباره</button>
        </div>
    </div>

    <audio id="royalAudio" preload="none"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import {
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            collection,
            addDoc,
            query,
            where,
            orderBy,
            onSnapshot,
            serverTimestamp,
            getDocs,
            limit,
            increment
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZOVyp3r8rPsLHQDUOHsodNZA6BP_pEh0",
            authDomain: "messagerin.firebaseapp.com",
            projectId: "messagerin",
            storageBucket: "messagerin.firebasestorage.app",
            messagingSenderId: "1071488457159",
            appId: "1:1071488457159:web:56c84b88f196ccbed1a1e2",
            measurementId: "G-WN2SYBQN1W"
        };

        const IMGBB_API_KEY = "39ff6b8fa6551faed4ba25549faf1211";
        const IMGBB_UPLOAD_URL = "https://api.imgbb.com/1/upload";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const $ = id => document.getElementById(id);

        let ME = null;
        let activeChatId = null;
        let activeChat = null;
        let msgUnsub = null;
        let chatsUnsub = null;
        let presenceTimer = null;
        let currentMainTab = "chats";
        let allMyChats = [];
        let splashDone = false;
        let pendingAuthUser = null;
        let isRoyalAudio = false;

        const state = {
            renderedMessages: new Set(),
            search: ""
        };

        const esc = s => String(s ?? "")
            .replace(/[&<>"']/g, c => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[c]));

        const emailFor = u => {
            const v = String(u || "").trim().toLowerCase();
            return v.includes("@") ? v : `${v}@wiriper.local`;
        };

        const initials = name => {
            const clean = String(name || "?").trim();
            return clean ? clean.slice(0, 2).toUpperCase() : "?";
        };

        const tsDate = ts => ts?.toDate ? ts.toDate() : ts ? new Date(ts) : null;

        const timeStr = ts => {
            const d = tsDate(ts);
            if (!d) return "";
            return d.toLocaleTimeString("fa-IR", { hour: "2-digit", minute: "2-digit" });
        };

        const dateStr = ts => {
            const d = tsDate(ts);
            if (!d) return "";
            return d.toLocaleDateString("fa-IR");
        };

        const privateChatId = (a, b) => [a, b].sort().join("_");

        const isOnline = ts => {
            const d = tsDate(ts);
            return d && Date.now() - d.getTime() < 90000;
        };

        const getLastSeenText = ts => {
            const d = tsDate(ts);
            if (!d) return "آخرین بازدید نامشخص";
            const diff = Math.floor((Date.now() - d.getTime()) / 1000);
            if (diff < 90) return "آنلاین";
            if (diff < 3600) return `${Math.floor(diff / 60)} دقیقه پیش`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} ساعت پیش`;
            return dateStr(ts);
        };

        function toast(text, icon = "") {
            const el = $("toast");
            el.textContent = `${icon ? icon + " " : ""}${text}`;
            el.classList.add("show");
            clearTimeout(toast._t);
            toast._t = setTimeout(() => el.classList.remove("show"), 2600);
        }

        function setAuthMsg(text, type = "") {
            const el = $("authMsg");
            el.textContent = text || "";
            el.className = type;
        }

        function closeMenus() {
            $("mainMenu").classList.remove("show");
            $("chatMenu").classList.remove("show");
        }

        function cleanup() {
            if (msgUnsub) msgUnsub(), msgUnsub = null;
            if (chatsUnsub) chatsUnsub(), chatsUnsub = null;
            if (presenceTimer) clearInterval(presenceTimer), presenceTimer = null;
        }

        function addRipple(e) {
            const btn = e.currentTarget;
            if (!btn || getComputedStyle(btn).position === "static") btn.style.position = "relative";
            const r = document.createElement("span");
            const box = btn.getBoundingClientRect();
            r.className = "ripple-effect";
            r.style.left = `${e.clientX - box.left}px`;
            r.style.top = `${e.clientY - box.top}px`;
            btn.appendChild(r);
            setTimeout(() => r.remove(), 600);
        }

        document.addEventListener("click", e => {
            if (e.target.closest("button")) addRipple(e);
            if (!e.target.closest(".menu") && !e.target.closest(".icon-btn")) closeMenus();
        });

        window.switchTab = function(t) {
            const login = t === "login";
            $("tabLogin").classList.toggle("active", login);
            $("tabReg").classList.toggle("active", !login);
            $("loginForm").classList.toggle("show", login);
            $("regForm").classList.toggle("show", !login);
            setAuthMsg("");
        };

        window.toggleMenu = function(e) {
            e?.stopPropagation?.();
            $("chatMenu").classList.remove("show");
            $("mainMenu").classList.toggle("show");
        };

        window.toggleChatMenu = function(e) {
            e?.stopPropagation?.();
            $("mainMenu").classList.remove("show");
            $("chatMenu").classList.toggle("show");
        };

        window.openModal = id => $(id)?.classList.add("show");
        window.closeModal = id => $(id)?.classList.remove("show");

        window.showMockModal = function(text) {
            $("mockText").textContent = text;
            $("lightbox").classList.add("show");
            closeMenus();
        };

        window.closeLightbox = function() {
            $("lightbox").classList.remove("show");
        };

        window.retryConnection = function() {
            location.reload();
        };

        window.toggleRoyalAudio = function() {
            isRoyalAudio = !isRoyalAudio;
            toast(isRoyalAudio ? "حالت سلطنتی فعال شد" : "حالت سلطنتی خاموش شد", "♛");
        };

        window.doRegister = async function() {
            const name = $("rName").value.trim();
            const username = $("rUser").value.trim().toLowerCase();
            const pass = $("rPass").value.trim();

            if (!name || !username || !pass) return setAuthMsg("همه فیلدها را پر کنید.", "err");
            if (username.length < 3) return setAuthMsg("نام کاربری باید حداقل ۳ کاراکتر باشد.", "err");
            if (pass.length < 6) return setAuthMsg("رمز عبور باید حداقل ۶ کاراکتر باشد.", "err");

            try {
                setAuthMsg("در حال ساخت حساب...");
                const email = emailFor(username);
                const cred = await createUserWithEmailAndPassword(auth, email, pass);

                await setDoc(doc(db, "users", cred.user.uid), {
                    uid: cred.user.uid,
                    name,
                    username,
                    email,
                    avatar: initials(name),
                    isPremium: false,
                    createdAt: serverTimestamp(),
                    lastOnline: serverTimestamp()
                });

                setAuthMsg("حساب ساخته شد.", "ok");
                toast("خوش آمدید", "✅");
            } catch (err) {
                console.error(err);
                setAuthMsg(errorText(err), "err");
            }
        };

        window.doLogin = async function() {
            const username = $("lUser").value.trim().toLowerCase();
            const pass = $("lPass").value.trim();

            if (!username || !pass) return setAuthMsg("نام کاربری و رمز عبور را وارد کنید.", "err");

            try {
                setAuthMsg("در حال ورود...");
                await signInWithEmailAndPassword(auth, emailFor(username), pass);
                setAuthMsg("");
            } catch (err) {
                console.error(err);
                setAuthMsg(errorText(err), "err");
            }
        };

        window.doLogout = async function() {
            try {
                cleanup();
                await signOut(auth);
                location.reload();
            } catch {
                toast("خروج ناموفق بود", "⚠️");
            }
        };

        function errorText(err) {
            const code = err?.code || "";
            if (code.includes("invalid-credential")) return "اطلاعات ورود اشتباه است.";
            if (code.includes("email-already-in-use")) return "این نام کاربری قبلاً ثبت شده است.";
            if (code.includes("network")) return "خطای اتصال اینترنت.";
            return "خطایی رخ داد. دوباره تلاش کنید.";
        }

        async function updatePresence() {
            if (!ME?.uid) return;
            try {
                await updateDoc(doc(db, "users", ME.uid), { lastOnline: serverTimestamp() });
            } catch {}
        }

        async function loadMe(user) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);

            if (!snap.exists()) {
                const username = user.email?.split("@")[0] || user.uid.slice(0, 6);
                await setDoc(ref, {
                    uid: user.uid,
                    name: username,
                    username,
                    email: user.email,
                    avatar: initials(username),
                    isPremium: false,
                    createdAt: serverTimestamp(),
                    lastOnline: serverTimestamp()
                });
                ME = { uid: user.uid, name: username, username, email: user.email, isPremium: false };
            } else {
                ME = { uid: user.uid, ...snap.data() };
            }

            await updatePresence();
            presenceTimer = setInterval(updatePresence, 60000);
        }

        function renderMeHeader() {
            $("meName").textContent = ME?.name || "کاربر";
            $("meId").textContent = "@" + (ME?.username || ME?.uid?.slice(0, 7));
            $("meAvatar").textContent = ME?.avatar || initials(ME?.name);
        }

        function enterApp() {
            $("authScreen").style.display = "none";
            $("app").style.display = "grid";
            renderMeHeader();
            subscribeChats();
        }

        function checkAndProceed() {
            if (!splashDone) return;
            if (pendingAuthUser) enterApp();
            else $("authScreen").style.display = "flex";
        }

        setTimeout(() => {
            splashDone = true;
            $("splashScreen").classList.add("hideSplash");
            checkAndProceed();
        }, 1300);

        onAuthStateChanged(auth, async user => {
            try {
                if (!user) {
                    pendingAuthUser = null;
                    checkAndProceed();
                    return;
                }

                await loadMe(user);
                pendingAuthUser = user;
                checkAndProceed();
            } catch (err) {
                console.error(err);
                toast("خطا در بارگذاری حساب", "⚠️");
            }
        });

        function subscribeChats() {
            if (!ME?.uid) return;
            if (chatsUnsub) chatsUnsub();

            const q = query(
                collection(db, "chats"),
                where("members", "array-contains", ME.uid)
            );

            chatsUnsub = onSnapshot(q, snap => {
                allMyChats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                allMyChats.sort((a, b) => {
                    const at = tsDate(a.lastTime)?.getTime() || 0;
                    const bt = tsDate(b.lastTime)?.getTime() || 0;
                    return bt - at;
                });

                if (currentMainTab === "chats" && !activeChatId) renderChatList(allMyChats);
            }, err => {
                console.error(err);
                toast("خطا در دریافت چت‌ها", "⚠️");
            });
        }

        async function renderChatList(chats = [], isDiscover = false) {
            const list = $("mainList");
            const search = $("globalSearch").value.trim().toLowerCase();

            const filtered = chats.filter(c => {
                const name = getChatTitle(c).toLowerCase();
                const last = String(c.lastMessage || "").toLowerCase();
                return !search || name.includes(search) || last.includes(search);
            });

            if (!filtered.length) {
                list.innerHTML = `<div class="empty">چیزی برای نمایش وجود ندارد.</div>`;
                return;
            }

            list.innerHTML = filtered.map(chat => {
                const title = esc(getChatTitle(chat));
                const last = esc(chat.lastMessage || (isDiscover ? "برای ورود لمس کنید" : "بدون پیام"));
                const unread = Number(chat.unread?.[ME.uid] || 0);
                const online = chat.type === "private" && chat.peerLastOnline && isOnline(chat
                    .peerLastOnline);

                return `
          <div class="chat-item" onclick="${isDiscover ? `joinOrOpenChat('${chat.id}')` : `openChat('${chat.id}')`}">
            <div class="av">${esc(chat.avatar || initials(title))}</div>
            ${online ? `<span class="online-dot"></span>` : ""}
            <div class="ci-main">
              <div class="ci-row">
                <div class="ci-name">${title} ${chat.isPremium ? `<span class="tag">PRIME</span>` : ""}</div>
                <div class="ci-time">${timeStr(chat.lastTime)}</div>
              </div>
              <div class="ci-row">
                <div class="ci-last">${last}</div>
                ${unread ? `<div class="unread-badge">${unread}</div>` : ""}
              </div>
            </div>
          </div>
        `;
            }).join("");
        }

        function getChatTitle(chat) {
            if (!chat) return "چت";
            if (chat.title) return chat.title;
            if (chat.name) return chat.name;
            if (chat.type === "private") {
                return chat.peerName || "گفتگوی خصوصی";
            }
            return "چت بدون نام";
        }

        window.switchMainTab = function(tab) {
            currentMainTab = tab;
            activeChatId = null;
            activeChat = null;
            if (msgUnsub) msgUnsub(), msgUnsub = null;

            $("tabChats").classList.toggle("active", tab === "chats");
            $("tabDiscover").classList.toggle("active", tab === "discover");
            $("tabLeaders").classList.toggle("active", tab === "leaders");

            $("globalSearch").value = "";

            if (tab === "chats") {
                $("listTitle").textContent = "چت‌های من";
                renderChatList(allMyChats);
            } else if (tab === "discover") {
                $("listTitle").textContent = "دیسکاور";
                loadDiscover();
            } else {
                $("listTitle").textContent = "برترین‌ها";
                loadLeaders();
            }
        };

        window.filterCurrentList = function() {
            if (activeChatId) return;
            if (currentMainTab === "chats") renderChatList(allMyChats);
            if (currentMainTab === "discover") loadDiscover();
            if (currentMainTab === "leaders") loadLeaders();
        };

        window.loadDiscover = async function() {
            try {
                $("mainList").innerHTML = `<div class="empty">در حال بارگذاری...</div>`;
                const q = query(
                    collection(db, "chats"),
                    where("type", "==", "channel"),
                    limit(30)
                );
                const snap = await getDocs(q);
                const chats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderChatList(chats, true);
            } catch (err) {
                console.error(err);
                $("mainList").innerHTML = `<div class="empty danger">خطا در دریافت دیسکاور</div>`;
            }
        };

        async function loadLeaders() {
            try {
                $("mainList").innerHTML = `<div class="empty">در حال بارگذاری...</div>`;
                const q = query(collection(db, "users"), limit(30));
                const snap = await getDocs(q);
                const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                const search = $("globalSearch").value.trim().toLowerCase();
                const filtered = users.filter(u => {
                    const t = `${u.name || ""} ${u.username || ""}`.toLowerCase();
                    return !search || t.includes(search);
                });

                $("mainList").innerHTML = filtered.length ? filtered.map(u => `
          <div class="chat-item" onclick="startPrivateChat('${u.uid || u.id}','${esc(u.name || u.username || "کاربر")}')">
            <div class="av">${esc(u.avatar || initials(u.name || u.username))}</div>
            ${isOnline(u.lastOnline) ? `<span class="online-dot"></span>` : ""}
            <div class="ci-main">
              <div class="ci-row">
                <div class="ci-name">${esc(u.name || "کاربر")} ${u.isPremium ? `<span class="tag">PRIME</span>` : ""}</div>
                <div class="ci-time">${getLastSeenText(u.lastOnline)}</div>
              </div>
              <div class="ci-last">@${esc(u.username || u.id)}</div>
            </div>
          </div>
        `).join("") : `<div class="empty">کاربری یافت نشد.</div>`;
            } catch (err) {
                console.error(err);
                $("mainList").innerHTML = `<div class="empty danger">خطا در دریافت کاربران</div>`;
            }
        }

        window.startPrivateChat = async function(uid, name) {
            if (!ME?.uid || uid === ME.uid) return;
            const id = privateChatId(ME.uid, uid);
            const ref = doc(db, "chats", id);
            const snap = await getDoc(ref);

            if (!snap.exists()) {
                await setDoc(ref, {
                    type: "private",
                    members: [ME.uid, uid],
                    title: "",
                    createdAt: serverTimestamp(),
                    lastTime: serverTimestamp(),
                    lastMessage: "",
                    names: {
                        [ME.uid]: ME.name || ME.username,
                        [uid]: name
                    },
                    unread: {}
                });
            }

            openChat(id);
        };

        window.joinOrOpenChat = async function(id) {
            const ref = doc(db, "chats", id);
            const snap = await getDoc(ref);
            if (!snap.exists()) return toast("چت پیدا نشد", "⚠️");

            const chat = snap.data();
            if (!chat.members?.includes(ME.uid)) {
                await updateDoc(ref, {
                    members: [...(chat.members || []), ME.uid]
                });
            }

            openChat(id);
        };

        window.openChat = async function(id) {
            try {
                activeChatId = id;
                if (msgUnsub) msgUnsub();

                const ref = doc(db, "chats", id);
                const snap = await getDoc(ref);

                if (!snap.exists()) {
                    toast("چت پیدا نشد", "⚠️");
                    return;
                }

                activeChat = { id, ...snap.data() };

                if (activeChat.unread?.[ME.uid]) {
                    try {
                        await updateDoc(ref, { [`unread.${ME.uid}`]: 0 });
                    } catch {}
                }

                renderChatShell();
                subscribeMessages(id);
            } catch (err) {
                console.error(err);
                toast("خطا در باز کردن چت", "⚠️");
            }
        };

        function renderChatShell() {
            const title = esc(getChatTitle(activeChat));
            $("mainList").innerHTML = `
        <div class="chat-view">
          <div class="chat-head">
            <button class="icon-btn" onclick="closeActiveChat()">↩</button>
            <div class="av">${esc(activeChat.avatar || initials(title))}</div>
            <div style="min-width:0;flex:1">
              <div class="ci-name">${title}</div>
              <div class="ci-last">${activeChat.type === "private" ? "گفتگوی خصوصی" : "کانال / گروه"}</div>
            </div>
            <button class="icon-btn" onclick="toggleChatMenu(event)">⋮</button>
          </div>

          <div id="messages" class="messages"></div>

          <form class="composer" onsubmit="event.preventDefault();sendMessage()">
            <textarea id="messageInput" placeholder="پیام بنویسید..." rows="1"></textarea>
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(this)" />
            <button type="button" class="img-upload-btn" id="imgUploadBtn" onclick="document.getElementById('imageInput').click()" title="ارسال عکس">📷</button>
            <button class="btn" type="submit">ارسال</button>
          </form>
        </div>
      `;
            state.renderedMessages.clear();
        }

        function subscribeMessages(chatId) {
            const q = query(
                collection(db, "chats", chatId, "messages"),
                orderBy("timestamp", "asc"),
                limit(150)
            );

            msgUnsub = onSnapshot(q, snap => {
                const box = $("messages");
                if (!box) return;

                const shouldStick = box.scrollTop + box.clientHeight >= box.scrollHeight - 80;

                box.innerHTML = snap.docs.map(d => {
                    const m = { id: d.id, ...d.data() };
                    const mine = m.senderId === ME.uid;
                    let content;
                    if (m.type === "image" && m.imageUrl) {
                        content =
                            `<a href="${esc(m.imageUrl)}" target="_blank" rel="noopener"><img src="${esc(m.imageUrl)}" alt="عکس ارسال شده" loading="lazy" /></a>`;
                    } else {
                        content = esc(m.text || "");
                    }
                    return `
            <div class="msg ${mine ? "me" : ""}">
              ${content}
              <span class="msg-time">${timeStr(m.timestamp)}</span>
            </div>
          `;
                }).join("");

                if (shouldStick) box.scrollTop = box.scrollHeight;
            }, err => {
                console.error(err);
                toast("خطا در دریافت پیام‌ها", "⚠️");
            });
        }

        window.sendMessage = async function() {
            const input = $("messageInput");
            if (!input || !activeChatId) return;

            const text = input.value.trim();
            if (!text) return;

            input.value = "";

            try {
                await addDoc(collection(db, "chats", activeChatId, "messages"), {
                    text,
                    senderId: ME.uid,
                    senderName: ME.name || ME.username,
                    timestamp: serverTimestamp(),
                    type: "text"
                });

                const unreadUpdate = {};
                const members = activeChat?.members || [];
                members.forEach(uid => {
                    if (uid !== ME.uid) unreadUpdate[`unread.${uid}`] = increment(1);
                });

                await updateDoc(doc(db, "chats", activeChatId), {
                    lastMessage: text.slice(0, 120),
                    lastSender: ME.uid,
                    lastTime: serverTimestamp(),
                    ...unreadUpdate
                });
            } catch (err) {
                console.error(err);
                toast("ارسال پیام ناموفق بود", "⚠️");
                input.value = text;
            }
        };

        window.sendImageMessage = async function(imageUrl) {
            if (!activeChatId || !imageUrl) return;

            try {
                await addDoc(collection(db, "chats", activeChatId, "messages"), {
                    text: "📷 عکس",
                    imageUrl: imageUrl,
                    senderId: ME.uid,
                    senderName: ME.name || ME.username,
                    timestamp: serverTimestamp(),
                    type: "image"
                });

                const unreadUpdate = {};
                const members = activeChat?.members || [];
                members.forEach(uid => {
                    if (uid !== ME.uid) unreadUpdate[`unread.${uid}`] = increment(1);
                });

                await updateDoc(doc(db, "chats", activeChatId), {
                    lastMessage: "📷 عکس",
                    lastSender: ME.uid,
                    lastTime: serverTimestamp(),
                    ...unreadUpdate
                });

                toast("عکس ارسال شد", "✅");
            } catch (err) {
                console.error(err);
                toast("ارسال عکس ناموفق بود", "⚠️");
            }
        };

        window.handleImageUpload = async function(fileInput) {
            const file = fileInput?.files?.[0];
            if (!file) return;

            if (file.size > 32 * 1024 * 1024) {
                toast("حجم فایل نباید بیشتر از ۳۲ مگابایت باشد", "⚠️");
                fileInput.value = "";
                return;
            }

            const uploadBtn = $("imgUploadBtn");
            if (uploadBtn) uploadBtn.classList.add("uploading");

            toast("در حال آپلود عکس...", "📤");

            try {
                const formData = new FormData();
                formData.append("key", IMGBB_API_KEY);
                formData.append("image", file);

                const response = await fetch(IMGBB_UPLOAD_URL, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error?.message || "خطای نامشخص در آپلود");
                }

                const imageUrl = result.data?.url || result.data?.display_url;
                if (!imageUrl) throw new Error("آدرس عکس دریافت نشد");

                await window.sendImageMessage(imageUrl);
            } catch (err) {
                console.error("Image upload error:", err);
                toast("آپلود عکس ناموفق بود. دوباره تلاش کنید.", "⚠️");
            } finally {
                if (uploadBtn) uploadBtn.classList.remove("uploading");
                fileInput.value = "";
            }
        };

        window.closeActiveChat = function() {
            activeChatId = null;
            activeChat = null;
            if (msgUnsub) msgUnsub(), msgUnsub = null;
            closeMenus();
            renderChatList(allMyChats);
        };

        window.addEventListener("online", () => {
            $("offlineOverlay").classList.remove("show");
            toast("اتصال برقرار شد", "✅");
        });

        window.addEventListener("offline", () => {
            $("offlineOverlay").classList.add("show");
        });
    </script>
</body>
</html>
