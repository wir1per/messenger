<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Wiriper Prime - پیام‌رسان سلطنتی نسل جدید">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
    <title>Wiriper Prime | پیام‌رسان سلطنتی</title>
    <style>
        :root {
            /* ===== Surfaces ===== */
            --bg: #0a0a0f;
            --bg2: #12121c;
            --panel: rgba(20, 20, 30, 0.72);
            --panel2: rgba(28, 28, 42, 0.60);

            /* ===== Royal gold ===== */
            --gold: #e8c372;
            --gold2: #c79b46;
            --gold-glow: rgba(232, 195, 114, 0.18);
            --gold-glow-strong: rgba(232, 195, 114, 0.42);

            /* ===== Text ===== */
            --txt: #f4f4f7;
            --muted: #9a9aae;

            /* ===== Bubbles ===== */
            --me: linear-gradient(135deg, #c79b46 0%, #e8c372 100%);
            --other: rgba(40, 40, 56, 0.72);

            /* ===== Lines & status ===== */
            --line: rgba(255, 255, 255, 0.07);
            --danger: #ff5a6a;
            --green: #34d399;
            --premium: linear-gradient(135deg, #e8c372, #b07cff);

            /* ===== Radii ===== */
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 30px;

            /* ===== Type scale ===== */
            --font-xs: 11px;
            --font-sm: 13px;
            --font-md: 15px;
            --font-lg: 18px;
            --font-xl: 24px;

            /* ===== Safe areas ===== */
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);

            /* ===== Glass ===== */
            --glass-bg: rgba(22, 22, 34, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: 22px;

            /* ===== Elevation ===== */
            --elevation-1: 0 2px 8px rgba(0,0,0,0.25);
            --elevation-2: 0 8px 28px rgba(0,0,0,0.38);
            --elevation-3: 0 24px 64px rgba(0,0,0,0.55);

            /* ═══════════════════════════════════════════════════════════
               PREMIUM MOTION SYSTEM
               ═══════════════════════════════════════════════════════════ */
            /* Spring Physics Curves */
            --spring-smooth: cubic-bezier(0.4, 0.0, 0.2, 1);
            --spring-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --spring-gentle: cubic-bezier(0.25, 0.46, 0.45, 0.94);

            /* Motion Durations */
            --motion-instant: 100ms;
            --motion-fast: 200ms;
            --motion-smooth: 350ms;
            --motion-slow: 500ms;
            --motion-cinematic: 800ms;

            /* Stagger Delays */
            --stagger-xs: 30ms;
            --stagger-sm: 50ms;
            --stagger-md: 80ms;
            --stagger-lg: 120ms;

            /* Gesture Thresholds */
            --swipe-threshold: 60px;
            --long-press-duration: 500ms;
            --drag-snap-distance: 120px;

            /* Atmospheric Layers */
            --atmos-glow-1: radial-gradient(circle at 20% 30%, rgba(212, 168, 50, 0.08), transparent 60%);
            --atmos-glow-2: radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.06), transparent 55%);
            --atmos-orb: radial-gradient(circle, rgba(212, 168, 50, 0.15), rgba(212, 168, 50, 0.02) 40%, transparent 70%);

            /* Depth & Lighting */
            --depth-1: 0 2px 8px rgba(0, 0, 0, 0.15);
            --depth-2: 0 4px 16px rgba(0, 0, 0, 0.2);
            --depth-3: 0 8px 32px rgba(0, 0, 0, 0.25);
            --light-edge: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --premium-glow-hover: 0 0 24px rgba(212, 168, 50, 0.3), 0 0 48px rgba(212, 168, 50, 0.15);

            /* Haptic Scales */
            --haptic-press: 0.94;
            --haptic-lift: 1.02;
            --haptic-strong: 0.88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'SF Pro Text', Tahoma, system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        html,
        body {
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            color: var(--txt);
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ═══════════════════════════════════════════════════════════
           ATMOSPHERIC BACKGROUND SYSTEM
           ═══════════════════════════════════════════════════════════ */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                var(--atmos-glow-1),
                var(--atmos-glow-2);
            animation: atmos-drift 40s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes atmos-drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5%, 3%) rotate(2deg); }
            66% { transform: translate(-3%, 5%) rotate(-1deg); }
        }

        .atmos-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--atmos-orb);
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            animation: orb-float 25s ease-in-out infinite;
        }

        .atmos-orb:nth-child(1) {
            top: 10%;
            left: 15%;
            animation-delay: 0s;
        }

        .atmos-orb:nth-child(2) {
            bottom: 20%;
            right: 10%;
            animation-delay: -8s;
            opacity: 0.7;
        }

        @keyframes orb-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.1); }
        }

        button,
        input,
        textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* ---- BUTTON BASE ---- */
        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: transform var(--motion-fast) var(--spring-bounce),
                        box-shadow var(--motion-smooth) var(--spring-smooth),
                        background var(--motion-smooth) var(--spring-smooth),
                        color var(--motion-fast) var(--spring-smooth);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        button:active {
            transform: scale(var(--haptic-press));
        }

        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 168, 50, 0.4), rgba(255, 255, 255, 0.15) 50%, transparent 70%);
            transform: scale(0);
            animation: premium-ripple 0.65s var(--spring-smooth);
            pointer-events: none;
        }

        @keyframes premium-ripple {
            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .btn-main {
            width: 100%;
            padding: 13px;
            background: var(--premium);
            color: #000;
            font-weight: 900;
            font-size: var(--font-md);
            border-radius: var(--radius);
            margin-top: 6px;
            box-shadow: var(--gold-glow), var(--light-edge);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform var(--motion-smooth) var(--spring-bounce),
                        box-shadow var(--motion-smooth) var(--spring-smooth),
                        filter var(--motion-fast) var(--spring-smooth);
        }

        .btn-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left var(--motion-slow) var(--spring-smooth);
            pointer-events: none;
        }

        .btn-main:hover {
            transform: translateY(-2px) scale(var(--haptic-lift));
            box-shadow: var(--gold-glow-strong), var(--premium-glow-hover), var(--light-edge);
            filter: brightness(1.08);
        }

        .btn-main:hover::before {
            left: 100%;
        }

        .btn-main:active {
            transform: scale(var(--haptic-press));
        }

        .btn-main.loading {
            color: transparent;
            pointer-events: none;
        }

        .btn-main.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: btn-spin 0.7s linear infinite;
        }

        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.03);
            flex-shrink: 0;
            transition: transform var(--motion-fast) var(--spring-elastic),
                        background var(--motion-smooth) var(--spring-smooth),
                        border-color var(--motion-smooth) var(--spring-smooth),
                        color var(--motion-fast) var(--spring-smooth),
                        box-shadow var(--motion-smooth) var(--spring-smooth);
            font-size: 14px;
        }

        .icon-btn:hover {
            background: rgba(212, 168, 50, 0.12);
            border-color: var(--gold2);
            color: var(--gold2);
            transform: translateY(-1px) scale(1.08);
            box-shadow: 0 4px 16px rgba(212, 168, 50, 0.18), var(--premium-glow-hover);
        }

        .icon-btn:active {
            transform: scale(var(--haptic-press));
        }

        /* ---- SPLASH ---- */
        #splashScreen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: radial-gradient(ellipse at 50% 30%, #131523 0%, #0a0b14 45%, #010206 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.7s ease-out, visibility 0.7s;
            overflow: hidden;
        }
        #splashScreen::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(232, 195, 114, 0.08) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: splashGlow 2.6s ease-in-out infinite;
        }
        #splashScreen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        @keyframes splashGlow {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
        }
        .splash-content {
            text-align: center;
            position: relative;
            z-index: 2;
            animation: splashRise 0.9s ease-out both;
        }
        .splash-crown {
            font-size: 78px;
            animation: crownPulse 1.8s ease-in-out infinite;
            filter: drop-shadow(0 0 50px rgba(232, 195, 114, 0.85));
            display: block;
        }
        @keyframes crownPulse {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 35px rgba(232, 195, 114, 0.7));
            }
            50% {
                transform: scale(1.15) rotate(2deg);
                filter: drop-shadow(0 0 70px rgba(232, 195, 114, 1));
            }
        }
        .splash-title {
            font-size: 40px;
            font-weight: 900;
            background: linear-gradient(135deg, #e8c372 0%, #fef9d0 40%, #c79b46 70%, #e8c372 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 14px;
            animation: shineText 3s ease-in-out infinite, fadeInUp 0.7s ease-out;
            letter-spacing: 1px;
        }
        @keyframes shineText {
            0%,
            100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .splash-sub {
            color: #9a9aae;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeInUp 0.9s ease-out;
            font-weight: 600;
        }
        @keyframes splashRise {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #e8c372;
            border-radius: 50%;
            animation: sparkleFloat 1.6s ease-in-out infinite;
            opacity: 0;
        }
        .sparkle:nth-child(1) { left: 15%; top: 25%; animation-delay: 0s; }
        .sparkle:nth-child(2) { left: 78%; top: 20%; animation-delay: 0.35s; }
        .sparkle:nth-child(3) { left: 25%; top: 68%; animation-delay: 0.7s; }
        .sparkle:nth-child(4) { left: 68%; top: 70%; animation-delay: 1.05s; }
        .sparkle:nth-child(5) { left: 50%; top: 14%; animation-delay: 1.4s; }
        @keyframes sparkleFloat {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            50% { opacity: 1; transform: translateY(-24px) scale(2.2); }
            100% { opacity: 0; transform: translateY(-50px) scale(0); }
        }

        /* ---- KEYFRAMES ---- */
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(6px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulseBorder { 0% { border-color: var(--gold2); box-shadow: var(--gold-glow); } 100% { border-color: #fff; box-shadow: var(--gold-glow-strong); } }
        @keyframes skeletonShimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes typingDot { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }
        @keyframes floatUp { 0% { transform: translateY(0); } 50% { transform: translateY(-3px); } 100% { transform: translateY(0); } }
        @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 0 2px var(--panel), 0 0 10px var(--green); } 50% { box-shadow: 0 0 0 2px var(--panel), 0 0 20px var(--green); } }
        @keyframes badgePop { 0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @keyframes borderGlow { 0%, 100% { border-color: rgba(232, 195, 114, 0.3); } 50% { border-color: rgba(232, 195, 114, 0.8); } }
        @keyframes presencePing { 0% { transform: scale(1); opacity: 0.7; } 70% { transform: scale(2.6); opacity: 0; } 100% { opacity: 0; } }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* ---- STAGGER IN ---- */
        .stagger-in {
            animation: stagger-enter var(--motion-smooth) var(--spring-smooth) backwards;
        }
        @keyframes stagger-enter {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .keyboard-nav button:focus,
        .keyboard-nav .chat-item:focus {
            outline: 2px solid var(--gold2);
            outline-offset: 2px;
        }

        /* ---- GENERAL ---- */
        /* ===== Premium scrollbar ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb {
            background: rgba(232,195,114,0.22);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(232,195,114,0.40); }
        ::-webkit-scrollbar-track { background: transparent; }

        :focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
            border-radius: 6px;
        }

        img {
            user-select: none;
            -webkit-user-drag: none;
        }

        /* ---- SKELETON ---- */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.07) 50%, rgba(255,
                        255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.6s ease-in-out infinite;
            border-radius: var(--radius);
        }
        .skeleton-av {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .skeleton-line {
            height: 13px;
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .skeleton-line.short {
            width: 60%;
        }
        .skeleton-line.medium {
            width: 80%;
        }
        .skeleton-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin: 3px 10px;
        }
        .skeleton-col {
            flex: 1;
            min-width: 0;
        }

        /* ---- TYPING INDICATOR ---- */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            font-size: var(--font-xs);
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 0.2px;
            animation: slideUp 0.3s ease-out;
        }
        .typing-indicator.show {
            display: flex;
        }
        .typing-dots {
            display: flex;
            gap: 3px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--gold2);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px var(--gold-glow);
            animation: typingDot 1.3s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        /* ---- AUTH ---- */
        #authScreen {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% -10%, #1c1d2a 0%, #0d0e16 55%, var(--bg) 100%);
            z-index: 50;
            padding: 16px;
        }
        .auth-card {
            width: 100%;
            max-width: 380px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 34px 26px;
            box-shadow: var(--elevation-3), 0 0 60px var(--gold-glow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            position: relative;
            z-index: 1;
            animation: splashRise 0.6s ease-out both;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 22px;
            animation: popIn 0.35s ease;
        }
        .auth-logo h1 {
            background: var(--premium);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            letter-spacing: 1px;
            font-weight: 900;
        }
        .auth-logo p {
            color: var(--muted);
            font-size: 11px;
            margin-top: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .auth-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .auth-tabs button {
            flex: 1;
            padding: 10px;
            background: none;
            color: var(--muted);
            border-radius: 12px;
            font-size: var(--font-sm);
            font-weight: 800;
            transition: all 0.3s ease;
        }
        .auth-tabs button.active {
            background: var(--premium);
            color: #1a1408;
            box-shadow: 0 4px 16px var(--gold-glow-strong);
            transform: scale(1.02);
        }
        .auth-form {
            display: none;
        }
        .auth-form:first-of-type {
            display: block;
        }
        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            font-size: 10px;
            color: var(--gold);
            margin-bottom: 5px;
            font-weight: 700;
            margin-right: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .field input,
        .field textarea {
            width: 100%;
            padding: 13px 16px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            color: var(--txt);
            font-size: var(--font-md);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }
        .field input:focus,
        .field textarea:focus {
            border-color: rgba(232, 195, 114, 0.55);
            box-shadow: 0 0 0 3px var(--gold-glow), inset 0 2px 5px rgba(0, 0, 0, 0.25);
            background: rgba(0, 0, 0, 0.65);
        }
        .auth-msg {
            margin-top: 12px;
            font-size: 11px;
            text-align: center;
            min-height: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            opacity: 0;
        }
        .auth-msg.show {
            opacity: 1;
        }
        .auth-msg.err {
            color: var(--danger);
        }
        .auth-msg.ok {
            color: var(--gold2);
        }

        /* ---- APP LAYOUT ---- */
        #app {
            display: none;
            height: 100dvh;
        }
    </style>
</head>
<body>
    <!-- Atmospheric Background -->
    <div class="atmos-orb"></div>
